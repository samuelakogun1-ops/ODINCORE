<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | Odin Central</title>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #0b0f19; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: rgba(22, 30, 46, 0.8); padding: 40px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; margin: 10px 0; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
        button:hover { background: #2563eb; }
        .error { color: #ef4444; font-size: 13px; margin-top: 15px; display: none; padding: 10px; border: 1px solid #ef4444; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color: #3b82f6; margin-bottom: 5px;">ODIN CENTRAL</h2>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px;">Private Wealth Access</p>
        <input type="text" id="u" placeholder="Account ID / Username" autocomplete="off">
        <input type="password" id="p" placeholder="Security Password">
        <button onclick="attemptLogin()">Secure Access</button>
        <div id="errMsg" class="error">ACCESS DENIED: Invalid Credentials.</div>
    </div>
    <script>
        function attemptLogin() {
            const userIn = document.getElementById('u').value.toLowerCase().trim();
            const passIn = document.getElementById('p').value.trim();
            const err = document.getElementById('errMsg');
            const savedUser = (localStorage.getItem('loginUser') || "admin").toLowerCase();
            const savedPass = localStorage.getItem('loginPass') || "admin123";
            if (userIn === savedUser && passIn === savedPass) {
                window.location.href = "dashboard.html";
            } else {
                err.style.display = "block";
            }
        }
    </script>
</body>
</html>
