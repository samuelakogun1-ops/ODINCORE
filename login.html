<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access | Odin Central</title>
    <style>
        :root { --accent-blue: #3b82f6; --bg-dark: #0f172a; --panel-bg: rgba(30, 41, 59, 0.9); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-card { background: var(--panel-bg); padding: 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); backdrop-filter: blur(10px); }
        h2 { margin: 0 0 5px 0; letter-spacing: 2px; color: var(--accent-blue); font-size: 22px; font-weight: 800; }
        p { font-size: 11px; color: #94a3b8; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 10px; color: #64748b; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 14px; background: #020617; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
        .btn-access { background: var(--accent-blue); color: white; border: none; padding: 16px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; margin-top: 10px; }
        .btn-access:hover { background: #2563eb; transform: translateY(-1px); }
        #error-msg { color: #ef4444; font-size: 12px; margin-top: 20px; display: none; padding: 12px; border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 6px; background: rgba(239, 68, 68, 0.1); }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>ODIN CENTRAL</h2>
        <p>Private Wealth Access</p>
        
        <div class="input-group">
            <label>Account ID / Username</label>
            <input type="text" id="userIn" placeholder="Enter Username" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label>Security Password</label>
            <input type="password" id="passIn" placeholder="••••••••">
        </div>
        
        <button class="btn-access" onclick="attemptLogin()">Secure Access</button>
        
        <div id="error-msg">ACCESS DENIED: Invalid Credentials.</div>
    </div>

    <script>
        function attemptLogin() {
            const userIn = document.getElementById('userIn').value.trim();
            const passIn = document.getElementById('passIn').value.trim();
            const error = document.getElementById('error-msg');

            // Retrieves data saved by your Admin Panel's "Deploy" function
            const savedUser = localStorage.getItem('userName');
            const savedPass = localStorage.getItem('userPass');

            // Hidden "Master Bypass" if needed for testing
            if (userIn === savedUser && passIn === savedPass) {
                error.style.display = "none";
                // Redirects to your dashboard file
                window.location.href = "dashboard.html";
            } else {
                // Displays the error message from your screenshot
                error.style.display = "block";
            }
        }

        // Allow "Enter" key to trigger login
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                attemptLogin();
            }
        });
    </script>
</body>
</html>
