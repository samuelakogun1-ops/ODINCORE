<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Odinscafe Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl shadow-slate-200/60 border border-slate-100 overflow-hidden">
        <div class="p-8 text-center bg-slate-900 text-white">
            <div class="inline-flex items-center justify-center bg-blue-600 p-3 rounded-2xl mb-4">
                <i class="fas fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold tracking-tight">ODINS<span class="text-blue-400">CAFE</span></h2>
            <p class="text-slate-400 text-sm mt-1 uppercase tracking-widest font-semibold">Secure Gateway</p>
        </div>

        <div class="p-8">
            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">User ID / Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" placeholder="Enter your ID" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
            </div>

            <div class="mb-6">
                <div class="flex justify-between mb-2">
                    <label class="text-sm font-bold text-slate-700">Password</label>
                    <a href="#" class="text-xs font-semibold text-blue-600 hover:underline">Forgot?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" placeholder="••••••••" 
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition">
                </div>
            </div>

            <a href="dashboard.html" 
               class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold transition flex items-center justify-center gap-2 shadow-lg shadow-blue-200">
                <span>Sign In to Dashboard</span>
                <i class="fas fa-arrow-right text-sm"></i>
            </a>

            <div class="mt-8 text-center">
                <p class="text-slate-500 text-sm">Don't have an account? <a href="#" class="text-blue-600 font-bold hover:underline">Register</a></p>
            </div>
        </div>

        <div class="p-4 bg-slate-50 text-center border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-medium uppercase">
                <i class="fas fa-certificate mr-1"></i> SSL Encrypted Connection
            </p>
        </div>
    </div>

</body>
</html>
