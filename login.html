<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login | Odin Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100 p-6">
    <div class="w-full max-w-md overflow-hidden rounded-[2rem] border border-slate-200 bg-white shadow-xl shadow-slate-200/60">
        <div class="bg-slate-900 p-8 text-center text-white">
            <div class="mb-4 inline-flex items-center justify-center rounded-2xl bg-blue-600 p-3">
                <i class="fas fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-2xl font-bold tracking-tight">ODIN <span class="text-blue-400">PRIVATE</span></h2>
            <p class="mt-1 text-sm font-semibold uppercase tracking-[0.25em] text-slate-400">Secure Gateway</p>
        </div>

        <div class="p-8">
            <div id="loginStatus" class="mb-5 hidden rounded-xl border border-blue-100 bg-blue-50 px-4 py-3 text-sm font-medium text-blue-700"></div>
            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="mb-2 block text-sm font-bold text-slate-700">Email Address</label>
                    <div class="relative">
                        <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fas fa-user"></i></span>
                        <input id="email" type="email" placeholder="name@company.com" required class="w-full rounded-xl border border-slate-200 bg-slate-50 py-3 pl-10 pr-4 transition focus:border-transparent focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <div>
                    <div class="mb-2 flex items-center justify-between">
                        <label class="text-sm font-bold text-slate-700">Password</label>
                        <a href="#" class="text-xs font-semibold text-blue-600 hover:underline">Forgot?</a>
                    </div>
                    <div class="relative">
                        <span class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fas fa-lock"></i></span>
                        <input id="password" type="password" placeholder="••••••••" required class="w-full rounded-xl border border-slate-200 bg-slate-50 py-3 pl-10 pr-4 transition focus:border-transparent focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>

                <button type="submit" class="flex w-full items-center justify-center gap-2 rounded-xl bg-blue-600 py-4 font-bold text-white shadow-lg shadow-blue-200 transition hover:bg-blue-700">
                    <span>Sign In to Dashboard</span><i class="fas fa-arrow-right text-sm"></i>
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-sm text-slate-500">Need an account? <a href="index.html" class="font-bold text-blue-600 hover:underline">Contact our team</a></p>
            </div>
        </div>

        <div class="border-t border-slate-100 bg-slate-50 p-4 text-center">
            <p class="text-[10px] font-medium uppercase tracking-[0.2em] text-slate-400"><i class="fas fa-certificate mr-1"></i> SSL Encrypted Connection</p>
        </div>
    </div>

    <script>
        const statusBox = document.getElementById('loginStatus');
        const form = document.getElementById('loginForm');

        function hashPassword(password) {
            let hash = 0;
            for (let index = 0; index < password.length; index += 1) {
                hash = (hash << 5) - hash + password.charCodeAt(index);
                hash |= 0;
            }
            return `h${Math.abs(hash).toString(16)}`;
        }

        function getDefaultAdminUsers() {
            return [
                { id: 'ODIN-8842-X', name: 'Morris Thomas', username: 'morris', status: 'Verified Elite', balance: 94250, held: false, initials: 'MT', email: 'morris@odinprivate.com', phone: '+1-555-0101', accountNumber: '1002003001', registrationDate: '2025-01-14', lastLogin: '', loginActivity: [], isActive: true, passwordHash: hashPassword('Welcome123!'), registrationStatus: 'Active' },
                { id: 'ODIN-2217-B', name: 'Elena Hart', username: 'elena', status: 'Verified', balance: 24800, held: false, initials: 'EH', email: 'elena@odinprivate.com', phone: '+1-555-0102', accountNumber: '1002003002', registrationDate: '2025-02-09', lastLogin: '', loginActivity: [], isActive: true, passwordHash: hashPassword('Welcome123!'), registrationStatus: 'Active' },
                { id: 'ODIN-3394-C', name: 'Amir Das', username: 'amir', status: 'Pending Review', balance: 12600, held: false, initials: 'AD', email: 'amir@odinprivate.com', phone: '+1-555-0103', accountNumber: '1002003003', registrationDate: '2025-03-11', lastLogin: '', loginActivity: [], isActive: true, passwordHash: hashPassword('Welcome123!'), registrationStatus: 'Active' }
            ];
        }

        function resolveActiveUser(email) {
            const storedUsers = JSON.parse(localStorage.getItem('odinAdminUsers') || '[]');
            const users = storedUsers.length ? storedUsers : getDefaultAdminUsers();
            const normalizedEmail = email.toLowerCase();
            const matchByEmail = users.find((user) => user.email && user.email.toLowerCase() === normalizedEmail);
            if (matchByEmail) {
                return matchByEmail;
            }
            const nameToken = normalizedEmail.split('@')[0].replace(/[._-]/g, ' ');
            const matchByName = users.find((user) => user.name.toLowerCase().includes(nameToken) || nameToken.includes(user.name.toLowerCase().split(' ')[0]));
            return matchByName || users[0];
        }

        function saveUsers(list) {
            localStorage.setItem('odinAdminUsers', JSON.stringify(list));
            window.dispatchEvent(new Event('odin:state-updated'));
        }

        function showStatus(message, type) {
            statusBox.textContent = message;
            statusBox.className = type === 'error'
                ? 'mb-5 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm font-medium text-red-700'
                : 'mb-5 rounded-xl border border-green-200 bg-green-50 px-4 py-3 text-sm font-medium text-green-700';
            statusBox.classList.remove('hidden');
        }

        function verifyPassword(inputPassword, storedHash) {
            if (!storedHash) {
                return inputPassword === 'Welcome123!';
            }
            return hashPassword(inputPassword) === storedHash;
        }

        if (localStorage.getItem('odinAuth') === 'true') {
            window.location.href = 'dashboard.html';
        }

        if (!localStorage.getItem('odinAdminUsers')) {
            saveUsers(getDefaultAdminUsers());
        }

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            statusBox.classList.add('hidden');
            if (!email || !password) {
                showStatus('Please enter your email and password.', 'error');
                return;
            }
            if (!email.includes('@')) {
                showStatus('Please use a valid email address.', 'error');
                return;
            }
            if (password.length < 6) {
                showStatus('Password must be at least 6 characters.', 'error');
                return;
            }

            const users = JSON.parse(localStorage.getItem('odinAdminUsers') || '[]');
            const activeUser = users.find((user) => user.email && user.email.toLowerCase() === email.toLowerCase()) || resolveActiveUser(email);
            if (!activeUser || !verifyPassword(password, activeUser.passwordHash)) {
                showStatus('Incorrect password. Please try again.', 'error');
                return;
            }
            if (activeUser.isActive === false || activeUser.registrationStatus === 'Pending OTP') {
                showStatus('Account pending activation. Complete OTP verification with the administrator.', 'error');
                return;
            }

            activeUser.lastLogin = new Date().toISOString();
            activeUser.loginActivity = Array.isArray(activeUser.loginActivity) ? activeUser.loginActivity : [];
            activeUser.loginActivity.unshift(new Date().toISOString());
            saveUsers(users.map((user) => user.id === activeUser.id ? activeUser : user));

            localStorage.setItem('odinAuth', 'true');
            localStorage.setItem('odinUser', email);
            localStorage.setItem('odinActiveUserId', activeUser.id);
            localStorage.setItem('odinActiveUserName', activeUser.name);
            showStatus('Access verified. Redirecting to your dashboard...', 'success');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 900);
        });
    </script>
</body>
</html>
