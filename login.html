<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Private | Secure Login</title>
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #020617; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { width: 90%; max-width: 400px; padding: 40px; background: rgba(30, 41, 59, 0.7); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); text-align: center; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { background: #2563eb; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>ODIN PRIVATE</h2>
        <p style="color:#94a3b8; font-size:14px;">Secure Client Access</p>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkLogin()">Access Vault</button>
    </div>

    <script>
        function checkLogin() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value.trim();
            
            // Pulls from Admin, defaults if empty
            const savedU = (localStorage.getItem('loginUser') || "morris").toLowerCase().trim();
            const savedP = (localStorage.getItem('loginPass') || "1234").trim();

            if(u === savedU && p === savedP) {
                window.location.href = "dashboard.html";
            } else {
                alert("Authentication Failed. Please verify credentials.");
            }
        }
    </script>
</body>
</html>
