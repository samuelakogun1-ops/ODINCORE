<div class="card transaction-card p-4 shadow-sm">
    <div class="d-flex align-items-center mb-4">
        <div class="bg-primary text-white rounded-circle p-3 me-3">
            <i class="fas fa-globe-americas fa-lg"></i>
        </div>
        <div>
            <h5 class="mb-0 fw-bold">International Wire Transfer</h5>
            <small class="text-muted">Secure Global Fund Transmission</small>
        </div>
    </div>

    <form id="globalTransferForm">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold small text-uppercase">Beneficiary Full Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="ben-name" placeholder="John Doe" required>
                </div>
            </div>
            
            <div class="col-md-6">
                <label class="form-label fw-bold small text-uppercase">Beneficiary Bank Name</label>
                <div class="input-group">
                    <span class="input-group-text bg-light"><i class="fas fa-university"></i></span>
                    <input type="text" class="form-control" id="ben-bank" placeholder="e.g. Chase Bank" required>
                </div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small text-uppercase">SWIFT / BIC Code</label>
                <input type="text" class="form-control" id="ben-swift" placeholder="AAAA BB CC 123" required style="text-transform: uppercase;">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold small text-uppercase">IBAN / Account Number</label>
                <input type="text" class="form-control" id="ben-iban" placeholder="US00 0000 0000 0000" required>
            </div>

            <div class="col-12">
                <label class="form-label fw-bold small text-uppercase">Transfer Amount (USD)</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-primary text-white">$</span>
                    <input type="number" class="form-control fw-bold" id="ben-amount" placeholder="0.00" required>
                </div>
                <div class="form-text text-end">Available Balance: <span class="fw-bold text-dark" id="form-balance-check">$45,250.00</span></div>
            </div>

            <div class="col-12 mt-4">
                <button type="button" class="btn btn-primary w-100 py-3 fw-bold shadow-sm" onclick="initiateTransfer()">
                    PROCEED TO TRANSFER <i class="fas fa-arrow-right ms-2"></i>
                </button>
            </div>
        </div>
    </form>
</div>

<div id="transfer-overlay" class="d-none" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column;">
    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
    <h4 class="fw-bold">Securing Connection...</h4>
    <p class="text-muted">Encrypting transaction data</p>
</div>

<script>
function initiateTransfer() {
    const name = document.getElementById('ben-name').value;
    const amount = document.getElementById('ben-amount').value;
    
    if(!name || !amount) {
        alert("Please complete all fields.");
        return;
    }

    // Show Loading Animation
    const overlay = document.getElementById('transfer-overlay');
    overlay.classList.remove('d-none');

    // Simulate Network Delay
    setTimeout(() => {
        overlay.innerHTML = `
            <div class="text-center">
                <i class="fas fa-check-circle text-success fa-5x mb-3"></i>
                <h2 class="fw-bold">Transfer Initiated</h2>
                <p class="text-muted">Reference: #TRX-${Math.floor(Math.random() * 900000 + 100000)}</p>
                <button class="btn btn-dark px-5" onclick="window.location.reload()">Back to Home</button>
            </div>
        `;
        
        // This is where you would call your updateSystem function from the dashboard
        if(typeof updateSystem === "function") {
            updateSystem('Debit', parseFloat(amount), 'Wire Transfer to ' + name);
        }
    }, 2500);
}
</script>
