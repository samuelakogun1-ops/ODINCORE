<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Transfer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #050a14; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        #loader { display: none; }
        .transfer-box { background: #0d1526; padding: 40px; border-radius: 20px; border: 1px solid #1c263d; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="transfer-box">
        <div id="form-area">
            <h4 class="mb-4">International Wire</h4>
            <input type="text" id="name" class="form-control mb-3 bg-dark text-white border-secondary" placeholder="Beneficiary Name">
            <input type="number" id="amt" class="form-control mb-4 bg-dark text-white border-secondary" placeholder="Amount (USD)">
            <button class="btn btn-primary w-100 fw-bold" onclick="startProcess()">PROCEED TO TRANSFER</button>
        </div>
        
        <div id="loader">
            <div class="spinner-border text-primary mb-3"></div>
            <h5>Securing Connection...</h5>
            <p class="text-muted small">Encrypting transaction data</p>
        </div>
    </div>

    <script>
        function startProcess() {
            if(!document.getElementById('amt').value) return alert("Enter amount");
            document.getElementById('form-area').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
            
            // This is the magic that makes it work:
            setTimeout(() => {
                alert("Transfer Successful!");
                window.location.href = "index.html";
            }, 4000);
        }
    </script>
</body>
</html>
