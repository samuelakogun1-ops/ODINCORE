<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorize Transfer | Odin Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="flex min-h-screen items-center justify-center bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100 p-6">
    <div class="w-full max-w-md rounded-[2.5rem] border border-slate-200 bg-white p-8 text-center shadow-2xl">
        <div class="mb-6">
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-blue-50 text-blue-600"><i class="fas fa-shield-check text-2xl"></i></div>
            <h2 class="text-xl font-bold text-slate-800">Final Authorization</h2>
            <p class="mt-1 text-xs font-bold uppercase tracking-[0.2em] text-slate-400">Secure review before dispatch</p>
        </div>

        <div class="mb-8 space-y-4 rounded-3xl border border-slate-100 bg-slate-50 p-6 text-left">
            <div class="flex justify-between border-b border-slate-200 pb-2">
                <span class="text-[10px] font-bold uppercase text-slate-400">Beneficiary</span>
                <span id="dispName" class="text-sm font-bold text-slate-800">---</span>
            </div>
            <div class="flex justify-between border-b border-slate-200 pb-2">
                <span class="text-[10px] font-bold uppercase text-slate-400">Amount</span>
                <span id="dispAmt" class="text-sm font-bold text-blue-600">$0.00</span>
            </div>
            <div class="pt-2 text-center">
                <p class="text-[9px] font-bold uppercase text-slate-400">Transaction status</p>
                <p class="text-xs font-bold text-orange-500">Awaiting secure confirmation</p>
            </div>
        </div>

        <button id="finalBtn" class="w-full rounded-2xl bg-slate-900 py-5 font-bold text-white shadow-lg transition hover:bg-black">Confirm & Dispatch</button>
    </div>

    <script>
        const pendingTransfer = JSON.parse(localStorage.getItem('pendingTransfer') || '{}');
        document.getElementById('dispName').textContent = pendingTransfer.beneficiary || 'Unknown';
        document.getElementById('dispAmt').textContent = '$' + Number(pendingTransfer.amount || 0).toLocaleString();
        document.getElementById('finalBtn').textContent = pendingTransfer.status === 'Pending OTP' ? 'Awaiting admin approval' : 'Confirm & Dispatch';

        document.getElementById('finalBtn').addEventListener('click', function () {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Pending admin review...';

            const history = JSON.parse(localStorage.getItem('odinTransactions') || '[]');
            const pendingEntry = {
                ...pendingTransfer,
                status: 'Pending OTP',
                completedAt: new Date().toISOString()
            };
            history.unshift(pendingEntry);
            localStorage.setItem('odinTransactions', JSON.stringify(history.slice(0, 8)));

            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 700);
        });
    </script>
</body>
</html>
