<div id="chat-container" style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; font-family: sans-serif;">
    <button onclick="toggleChat()" style="background: #1e3c72; color: white; border: none; border-radius: 50%; width: 60px; height: 60px; cursor: pointer; shadow: 0 4px 10px rgba(0,0,0,0.3);">
        <i class="fas fa-comments"></i>
    </button>

    <div id="chat-box" style="display: none; width: 300px; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); overflow: hidden; margin-bottom: 10px;">
        <div style="background: #1e3c72; color: white; padding: 15px; font-weight: bold;">
            Support Center
            <span onclick="toggleChat()" style="float: right; cursor: pointer;">&times;</span>
        </div>
        <div id="chat-display" style="height: 250px; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; gap: 10px;">
            <div style="background: #e1e1e1; padding: 8px; border-radius: 5px; align-self: flex-start; max-width: 80%;">Hello! How can we assist with your transfer today?</div>
        </div>
        <div style="padding: 10px; border-top: 1px solid #ddd; display: flex;">
            <input type="text" id="chat-input" placeholder="Type a message..." style="flex: 1; border: 1px solid #ccc; border-radius: 4px; padding: 5px;">
            <button onclick="sendUserMessage()" style="background: #1e3c72; color: white; border: none; margin-left: 5px; border-radius: 4px; padding: 5px 10px;">Send</button>
        </div>
    </div>
</div>

<script>
function toggleChat() {
    const box = document.getElementById('chat-box');
    box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

function sendUserMessage() {
    const input = document.getElementById('chat-input');
    const display = document.getElementById('chat-display');
    if (input.value.trim() !== "") {
        display.innerHTML += `<div style="background: #1e3c72; color: white; padding: 8px; border-radius: 5px; align-self: flex-end; max-width: 80%;">${input.value}</div>`;
        // Logic to send this to the Admin Panel goes here
        input.value = "";
        display.scrollTop = display.scrollHeight;
    }
}
</script>
