<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Successful | Odinscafe Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .success-checkmark {
            animation: scaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes scaleIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-md w-full">
        <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 overflow-hidden relative">
            
            <div class="bg-green-500 p-10 text-center relative">
                <div class="success-checkmark inline-flex items-center justify-center w-20 h-20 bg-white rounded-full shadow-lg mb-4">
                    <i class="fas fa-check text-3xl text-green-500"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">Transfer Initiated</h2>
                <p class="text-green-100 text-sm mt-1">Ref ID: <span class="font-mono">TXN-99284-OCS</span></p>
            </div>

            <div class="p-8">
                <div class="space-y-4 mb-8">
                    <div class="flex justify-between items-center py-2 border-b border-slate-50">
                        <span class="text-xs font-bold text-slate-400 uppercase">Amount Sent</span>
                        <span class="font-bold text-slate-800">$2,400.00</span>
                    </div>
                    <div class="flex justify-between items-center py-2 border-b border-slate-50">
                        <span class="text-xs font-bold text-slate-400 uppercase">To Recipient</span>
                        <span class="font-bold text-slate-800">John Doe Corp.</span>
                    </div>
                    <div class="flex justify-between items-center py-2 border-b border-slate-50">
                        <span class="text-xs font-bold text-slate-400 uppercase">Bank Name</span>
                        <span class="font-bold text-slate-800">JP Morgan Chase</span>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-xs font-bold text-slate-400 uppercase">Estimated Arrival</span>
                        <span class="font-bold text-blue-600">May 11, 2026</span>
                    </div>
                </div>

                <div class="bg-slate-50 rounded-2xl p-4 flex gap-3 items-center mb-8 border border-slate-100">
                    <i class="fas fa-envelope text-slate-400"></i>
                    <p class="text-[11px] text-slate-500 leading-tight">
                        A confirmation email with the full receipt has been sent to your registered address.
                    </p>
                </div>

                <div class="space-y-3">
                    <button class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-slate-800 transition flex items-center justify-center gap-2">
                        <i class="fas fa-download text-sm"></i> Download Receipt
                    </button>
                    <a href="dashboard.html" class="w-full bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold hover:bg-slate-200 transition block text-center">
                        Back to Dashboard
                    </a>
                </div>
            </div>
        </div>

        <div class="text-center mt-8">
            <p class="text-xs text-slate-400">
                Something wrong? <a href="#" class="text-blue-600 font-bold hover:underline">Contact 24/7 Support</a>
            </p>
        </div>
    </div>

</body>
</html>
