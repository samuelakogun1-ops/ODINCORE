<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Private | Wealth Management</title>
    <style>
        :root { --primary: #2563eb; --sidebar-bg: #0f172a; --bg-dark: #020617; --glass: rgba(30, 41, 59, 0.7); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Sidebar - Desktop Only */
        .sidebar { width: 280px; background: var(--sidebar-bg); padding: 25px; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; height: 100vh; }
        
        /* Mobile Navigation Bar */
        .mobile-nav { display: none; background: var(--sidebar-bg); padding: 10px; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-icon { font-size: 10px; color: #94a3b8; text-align: center; cursor: pointer; }
        .nav-icon.active { color: var(--primary); font-weight: bold; }

        /* Main Content */
        .main { flex: 1; padding: 20px; background: radial-gradient(circle at top right, #1e293b, #020617); overflow-y: auto; padding-bottom: 80px; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Panels & UI */
        .panel { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); margin-bottom: 20px; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }

        /* ATM Card Visual (Scales for Mobile) */
        .mini-atm { width: 100%; max-width: 300px; height: 160px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 12px; padding: 20px; position: relative; border: 1px solid rgba(255,255,255,0.1); margin: 10px auto; }
        .chip { width: 35px; height: 25px; background: #d4af37; border-radius: 4px; margin-bottom: 20px; }
        .card-num { font-size: 14px; letter-spacing: 2px; font-family: 'Courier New', monospace; }
        .status-badge { position: absolute; top: 15px; right: 15px; font-size: 9px; padding: 3px 8px; border-radius: 4px; }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .mobile-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; }
            .main { padding: 15px; }
            h1 { font-size: 32px !important; }
        }

        /* Transaction Log */
        .tx-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-size: 20px; font-weight: 800; margin-bottom: 30px;">ODIN PRIVATE</div>
    <div class="menu-item active" onclick="nav('v-dash', this)">Overview</div>
    <div class="menu-item" onclick="nav('v-wire', this)">Wire Transfer</div>
    <div class="menu-item" onclick="nav('v-history', this)">Transactions</div>
    <div class="menu-item" onclick="nav('v-support', this)">Concierge</div>
</div>

<div class="main">
    <div id="v-dash" class="view active">
        <div class="panel">
            <p style="color:#94a3b8; font-size:11px; margin:0;">TOTAL BALANCE</p>
            <h1 style="font-size:40px; margin:10px 0;" id="uBal">$0.00</h1>
            <div style="color:#22c55e; font-size:12px;">● Verified Portfolio</div>
        </div>
        
        <div class="panel" style="text-align:center;">
            <p style="font-size:10px; color:#64748b; font-weight:bold; margin-bottom:10px;">VIRTUAL ASSET CARD</p>
            <div class="mini-atm">
                <div id="cBadge" class="status-badge">ACTIVE</div>
                <div class="chip"></div>
                <div class="card-num">•••• •••• •••• 8812</div>
                <div style="margin-top:30px; display:flex; justify-content:space-between; font-size:10px;">
                    <span id="cName">MORRIS THOMAS</span>
                    <span>EXP 09/29</span>
                </div>
            </div>
        </div>
    </div>

    <div id="v-wire" class="view">
        <h2 style="font-size:18px;">International Wire</h2>
        <div class="panel">
            <input type="text" placeholder="Bank Name">
            <input type="text" placeholder="IBAN / Account Number">
            <select>
                <option>Select Country...</option>
                <option>Namibia</option>
                <option>Germany</option>
                <option>United States</option>
                <option>United Kingdom</option>
                <option>Australia</option>
                <option>Portugal</option>
            </select>
            <input type="number" placeholder="Amount ($)">
            <button class="btn-action">Submit Transfer</button>
        </div>
    </div>

    <div id="v-history" class="view">
        <h2 style="font-size:18px;">Transactions</h2>
        <div class="panel" id="txLog"></div>
    </div>

    <div id="v-support" class="view">
        <h2 style="font-size:18px;">Concierge</h2>
        <div class="panel">
            <div id="chatBox" style="height:200px; overflow-y:auto; font-size:13px; margin-bottom:10px;"></div>
            <input type="text" id="msgIn" placeholder="Type message...">
            <button class="btn-action" onclick="sendChat()">Send</button>
        </div>
    </div>
</div>

<div class="mobile-nav">
    <div class="nav-icon active" onclick="nav('v-dash', this)">🏠<br>Home</div>
    <div class="nav-icon" onclick="nav('v-wire', this)">💸<br>Transfer</div>
    <div class="nav-icon" onclick="nav('v-history', this)">📜<br>History</div>
    <div class="nav-icon" onclick="nav('v-support', this)">💬<br>Support</div>
</div>

<script>
    function nav(id, el) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-icon, .menu-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    function sync() {
        const name = localStorage.getItem('displayName') || "Morris Thomas";
        const bal = localStorage.getItem('balChk') || "10000000";
        const cStatus = localStorage.getItem('cardStatus') || "Active";

        document.getElementById('uBal').innerText = "$" + Number(bal).toLocaleString();
        document.getElementById('cName').innerText = name.toUpperCase();
        
        const badge = document.getElementById('cBadge');
        badge.innerText = cStatus.toUpperCase();
        badge.style.background = cStatus === "Active" ? "#059669" : "#d97706";

        const tx = JSON.parse(localStorage.getItem('user_history') || "[]");
        document.getElementById('txLog').innerHTML = tx.map(t => `
            <div class="tx-item">
                <div><b>${t.desc}</b><br><small>${t.date}</small></div>
                <div style="color:${t.amt.includes('-')?'#ef4444':'#22c55e'}">${t.amt}</div>
            </div>`).join('') || "No activity.";
    }

    window.onload = sync;
    setInterval(sync, 3000);
</script>
</body>
</html>
