<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Private | Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #2563eb; --bg: #020617; --card: #0f172a; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        
        /* The ATM Card */
        .atm-card { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 25px; height: 200px;
            position: relative; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .chip { width: 45px; height: 35px; background: #d4af37; border-radius: 6px; margin-bottom: 30px; }
        .card-num { font-family: 'Courier New', monospace; font-size: 22px; letter-spacing: 2px; }
        .card-name { margin-top: 25px; text-transform: uppercase; font-size: 14px; color: #94a3b8; }

        /* Balance & Stats */
        .panel { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .balance { font-size: 38px; font-weight: 800; margin: 10px 0; }
        
        /* Transaction History */
        .tx-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .amt-pos { color: #22c55e; }
        .amt-neg { color: #ef4444; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <p style="color: #94a3b8; font-size: 12px;">AVAILABLE BALANCE</p>
        <div class="balance" id="displayBal">$0.00</div>
    </div>

    <div class="atm-card">
        <div style="position:absolute; top:20px; right:25px; color:#059669; font-weight:bold; font-size:12px;">PREMIUM DEBIT</div>
        <div class="chip"></div>
        <div class="card-num">4412 8890 1233 0992</div>
        <div class="card-name" id="displayName">MORRIS THOMAS</div>
    </div>

    <div class="panel">
        <h3>Transaction History</h3>
        <div id="txHistory">
            <p style="color:#64748b; font-size:14px;">Loading global data...</p>
        </div>
    </div>
</div>

<script>
    // 1. PASTE YOUR KEYS HERE
    const firebaseConfig = {
        // [PASTE YOUR KEYS HERE FROM FIREBASE SETTINGS]
    };

    // 2. Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 3. Listen for Global Updates
    db.collection("accounts").doc("morris_thomas").onSnapshot((doc) => {
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('displayBal').innerText = "$" + Number(data.balance).toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('displayName').innerText = data.name;
            
            // Render Transactions
            let html = "";
            data.transactions.forEach(tx => {
                html += `
                    <div class="tx-item">
                        <div><b>${tx.desc}</b><br><small style="color:#64748b">${tx.date}</small></div>
                        <div class="${tx.type === 'plus' ? 'amt-pos' : 'amt-neg'}">${tx.type === 'plus' ? '+' : '-'}$${tx.amount}</div>
                    </div>`;
            });
            document.getElementById('txHistory').innerHTML = html;
        }
    });
</script>
</body>
</html>
