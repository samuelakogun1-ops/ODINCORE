<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | Odin's Cafe Bank</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; margin: 0; }
        .sidebar { width: 250px; background: #003366; color: white; height: 100vh; position: fixed; padding: 20px; }
        .main-content { margin-left: 290px; padding: 40px; }
        .balance-card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        .balance-card h3 { color: #888; margin: 0; }
        .balance-amount { font-size: 32px; font-weight: bold; color: #2ecc71; margin: 10px 0; }
        .nav-link { color: white; text-decoration: none; display: block; margin: 20px 0; font-size: 18px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Odin's Bank</h2>
        <a href="#" class="nav-link">Overview</a>
        <a href="#" class="nav-link">Transfer Funds</a>
        <a href="#" class="nav-link">Statements</a>
        <a href="index.html" class="nav-link" style="margin-top: 50px; color: #ff4444;">Logout</a>
    </div>
    <div class="main-content">
        <h1>Welcome Back, Client</h1>
        <div class="balance-card">
            <h3>Available Balance</h3>
            <div class="balance-amount">$12,450.00</div>
            <p>Account: ****5678</p>
        </div>
    </div>
    <div id="transferModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">
    <div style="background:white; padding:30px; border-radius:10px; width:400px;">
        <h2 style="color:#003366;">Transfer Funds</h2>
        <div style="margin-bottom:15px;">
            <label>Recipient's Account Number</label>
            <input type="text" id="accNumber" style="width:100%; padding:10px; margin-top:5px;">
        </div>
        <div style="margin-bottom:15px;">
            <label>Amount ($)</label>
            <input type="number" id="transferAmount" style="width:100%; padding:10px; margin-top:5px;">
        </div>
        <button onclick="processTransfer()" style="background:#2ecc71; color:white; border:none; padding:15px; width:100%; border-radius:5px; cursor:pointer;">Confirm Transfer</button>
        <button onclick="document.getElementById('transferModal').style.display='none'" style="background:none; border:none; color:red; margin-top:10px; cursor:pointer; width:100%;">Cancel</button>
    </div>
</div>

<script>
    // Show the modal when clicking "Transfer Funds"
    document.querySelectorAll('.nav-link')[1].onclick = function() {
        document.getElementById('transferModal').style.display = 'flex';
    };

    function processTransfer() {
        const amount = document.getElementById('transferAmount').value;
        if(amount) {
            alert('Transfer of $' + amount + ' is being processed by the central bank. Reference: ODIN-' + Math.floor(Math.random() * 1000000));
            document.getElementById('transferModal').style.display = 'none';
        }
    }
</script>
</body>
</html>
