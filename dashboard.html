<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transglobal | User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body { background: #f8f9fa; }
        .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .balance-card { background: #000; color: #fff; padding: 25px; }
        .status-success { color: green; font-weight: bold; }
        .status-error { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="container mt-4">
    <div class="card card-custom balance-card">
        <small>Total Portfolio Value</small>
        <h2 id="balance-display">$0.00</h2>
        <div class="mt-3">**** **** **** 0992</div>
        <div>MORRIS THOMAS</div>
    </div>

    <div class="card card-custom p-3">
        <h5>Recent Activity</h5>
        <div id="activity-list">
            <div class="d-flex justify-content-between border-bottom py-2">
                <div><strong>Offshore Salary Deposit</strong><br><small>April 27, 2026</small></div>
                <div class="text-success">+$10,000,000</div>
            </div>
        </div>
    </div>

    <div class="card card-custom p-3">
        <h5>International Wire Transfer</h5>
        <input type="text" id="target-name" class="form-control mb-2" placeholder="Beneficiary Name">
        <input type="number" id="transfer-amount" class="form-control mb-2" placeholder="Amount">
        <button class="btn btn-primary w-100" onclick="startTransfer()">Send Funds</button>
    </div>
</div>

<div id="chat-box" style="position:fixed; bottom:20px; right:20px; width:250px; background:white; border:1px solid #ccc; display:none;">
    <div class="bg-primary text-white p-2">Support</div>
    <div id="messages" style="height:150px; overflow-y:auto; padding:5px;"></div>
    <input type="text" id="chat-input" class="form-control" placeholder="Type msg..." onkeypress="if(event.key==='Enter') sendMsg()">
</div>
<button class="btn btn-primary rounded-circle" style="position:fixed; bottom:20px; right:20px;" onclick="document.getElementById('chat-box').style.display='block'">💬</button>

<script>
    // FIX: Pre-set the balance so it isn't NaN
    let balance = localStorage.getItem('userBalance') ? parseFloat(localStorage.getItem('userBalance')) : 10000000;
    document.getElementById('balance-display').innerText = "$" + balance.toLocaleString();

    function startTransfer() {
        let amt = parseFloat(document.getElementById('transfer-amount').value);
        let name = document.getElementById('target-name').value;
        
        if(!amt || !name) return alert("Fill all fields");
        if(amt > balance) return alert("Insufficient funds");

        balance -= amt;
        localStorage.setItem('userBalance', balance);
        document.getElementById('balance-display').innerText = "$" + balance.toLocaleString();

        // Add to history
        let row = `<div class="d-flex justify-content-between border-bottom py-2">
            <div><strong>Transfer to ${name}</strong><br><small>Today</small></div>
            <div class="text-danger">-$${amt.toLocaleString()}</div>
        </div>`;
        document.getElementById('activity-list').insertAdjacentHTML('afterbegin', row);
        alert("Transfer Successful!");
    }

    function sendMsg() {
        let input = document.getElementById('chat-input');
        let msg = input.value;
        document.getElementById('messages').innerHTML += `<div><b>Me:</b> ${msg}</div>`;
        localStorage.setItem('last_msg', msg); // Sends to Admin
        input.value = "";
    }
</script>
</body>
</html>
