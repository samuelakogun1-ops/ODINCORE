<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Odin Private | Wealth Management</title>
    <style>
        :root { --primary: #2563eb; --sidebar-bg: #0f172a; --bg-dark: #020617; --glass: rgba(30, 41, 59, 0.7); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: white; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .sidebar { width: 280px; background: var(--sidebar-bg); padding: 25px; border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; height: 100vh; position: relative; }
        .menu-item { padding: 14px; border-radius: 8px; cursor: pointer; color: #94a3b8; display: flex; align-items: center; gap: 12px; margin-bottom: 5px; font-size: 14px; }
        .menu-item.active { background: var(--primary); color: white; }

        .sidebar-bottom { margin-top: auto; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); }
        .mini-atm { width: 100%; height: 140px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 12px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); position: relative; box-sizing: border-box; }
        .mini-chip { width: 30px; height: 22px; background: #d4af37; border-radius: 4px; margin-bottom: 20px; }

        .mobile-nav { display: none; background: #0f172a; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.1); position: fixed; bottom: 0; width: 100%; z-index: 1000; }
        .nav-icon { flex: 1; text-align: center; color: #94a3b8; font-size: 11px; }
        .nav-icon.active { color: var(--primary); }

        .main { flex: 1; padding: 30px; overflow-y: auto; background: radial-gradient(circle at top right, #1e293b, #020617); padding-bottom: 100px; }
        .view { display: none; }
        .view.active { display: block; }
        .panel { background: var(--glass); padding: 25px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); margin-bottom: 20px; }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 10px; box-sizing: border-box; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .mobile-nav { display: flex; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="font-weight:800; font-size:20px; margin-bottom:30px;">ODIN PRIVATE</div>
    <div class="menu-item active" onclick="nav('v-dash', this)">Overview</div>
    <div class="menu-item" onclick="nav('v-wire', this)">Wire Transfer</div>
    <div class="menu-item" onclick="nav('v-history', this)">Transactions</div>
    <div class="menu-item" onclick="nav('v-support', this)">Concierge</div>

    <div class="sidebar-bottom">
        <div class="mini-atm">
            <div style="position:absolute; top:12px; right:12px; font-size:8px; background:#059669; padding:2px 6px; border-radius:3px;" id="cBadge">ACTIVE</div>
            <div class="mini-chip"></div>
            <div style="font-family:monospace; font-size:13px;">•••• •••• 8812</div>
            <div style="font-size:9px; margin-top:20px; color:#94a3b8;" id="cSideName">MORRIS THOMAS</div>
        </div>
    </div>
</div>

<div class="main">
    <div id="v-dash" class="view active">
        <div class="panel">
            <p style="color:#94a3b8; font-size:12px;">TOTAL ACCOUNT BALANCE</p>
            <h1 id="uBal" style="font-size:42px; margin:10px 0;">$0.00</h1>
        </div>
    </div>

    <div id="v-wire" class="view">
        <h2>Wire Transfer</h2>
        <div class="panel">
            <select>
                <option>Select Country...</option>
                <option>Namibia</option>
                <option>Germany</option>
                <option>USA</option>
                <option>UK</option>
            </select>
            <input type="number" placeholder="Amount ($)">
            <button class="btn-action" onclick="alert('Initiated')">Submit</button>
        </div>
    </div>

    <div id="v-history" class="view"><h2>Transactions</h2><div class="panel" id="txLog"></div></div>
    <div id="v-support" class="view"><h2>Support</h2><div class="panel"><div id="chatBox"></div></div></div>
</div>

<div class="mobile-nav">
    <div class="nav-icon active" onclick="nav('v-dash', this)">🏠<br>Home</div>
    <div class="nav-icon" onclick="nav('v-wire', this)">💸<br>Wire</div>
    <div class="nav-icon" onclick="nav('v-history', this)">📜<br>History</div>
    <div class="nav-icon" onclick="nav('v-support', this)">💬<br>Support</div>
</div>

<script>
    function nav(id, el) {
        document.querySelectorAll('.view, .menu-item, .nav-icon').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll("[onclick*='"+id+"']").forEach(btn => btn.classList.add('active'));
    }

    function sync() {
        const name = localStorage.getItem('displayName') || "Morris Thomas";
        const bal = localStorage.getItem('balChk') || "10000000";
        document.getElementById('uBal').innerText = "$" + Number(bal).toLocaleString();
        document.getElementById('cSideName').innerText = name.toUpperCase();
    }
    window.onload = sync;
</script>
</body>
</html>
