<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Odin's Cafe Bank</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">Odin's Bank</div>
        <nav>
            <a href="dashboard.html" class="nav-link active">Dashboard</a>
            <a href="#" class="nav-link">Transfer Funds</a>
            <a href="#" class="nav-link">Transaction History</a>
            <a href="#" class="nav-link">Settings</a>
            <a href="index.html" class="nav-link">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <h1>Welcome Back, Client</h1>
        
        <div class="balance-card">
            <h3>Available Balance</h3>
            <div class="balance-amount" id="displayBalance">$12,450.00</div>
            <p>Account: ****5678</p>
        </div>

        <div class="balance-card" style="margin-top: 20px;">
            <h3 style="margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 5px;">Recent Transactions</h3>
            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9;">
                <span>Apr 16 - Online Transfer</span>
                <span style="color: #e74c3c; font-weight: bold;">-$1,200.00</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #f9f9f9;">
                <span>Apr 15 - Salary Deposit</span>
                <span style="color: #2ecc71; font-weight: bold;">+$5,400.00</span>
            </div>
            <div style="display: flex; justify-content: space-between; padding: 10px 0;">
                <span>Apr 12 - Cashback Reward</span>
                <span style="color: #2ecc71; font-weight: bold;">+$25.50</span>
            </div>
        </div>
    </div>

    <div id="transferModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center; z-index:1000;">
        <div style="background:white; padding:30px; border-radius:10px; width:400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            <h2 style="color:#003366; margin-top:0;">Transfer Funds</h2>
            <div style="margin-bottom:15px;">
                <label style="color:#333; display:block; margin-bottom:5px;">Recipient's Account Number</label>
                <input type="text" id="accNumber" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="color:#333; display:block; margin-bottom:5px;">Amount ($)</label>
                <input type="number" id="transferAmount" style="width:100%; padding:12px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;">
            </div>
            <button onclick="processTransfer()" style="background:#2ecc71; color:white; border:none; padding:15px; width:100%; border-radius:5px; cursor:pointer; font-weight:bold; font-size:16px;">Confirm Transfer</button>
            <button onclick="document.getElementById('transferModal').style.display='none'" style="background:none; border:none; color:red; margin-top:15px; cursor:pointer; width:100%;">Cancel</button>
        </div>
    </div>

    <script>
        // 1. FREEZE CHECK: Stops the client if you hit "Freeze" in Admin
        if (localStorage.getItem('accStatus') === 'frozen') {
            document.body.innerHTML = "<div style='background:white; color:red; height:100vh; display:flex; justify-content:center; align-items:center; flex-direction:column; text-align:center;'><h1>ACCOUNT RESTRICTED</h1><p>Your account has been temporarily suspended.<br>Please contact the bank manager for verification.</p></div>";
        }

        // 2. ADMIN CONTROL: Updates the balance based on your Admin Panel
        const savedBalance = localStorage.getItem('clientBalance');
        if (savedBalance) {
            document.getElementById('displayBalance').innerText = '$' + parseFloat(savedBalance).toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        // 3. TRANSFER MODAL: Opens the popup
        document.querySelectorAll('.nav-link')[1].onclick = function(e) {
            e.preventDefault();
            document.getElementById('transferModal').style.display = 'flex';
        };

        // 4. TRANSFER LOGIC: Shows the success alert
        function processTransfer() {
            const amount = document.getElementById('transferAmount').value;
            const acc = document.getElementById('accNumber').value;
            if(amount && acc) {
                alert('Transfer of $' + amount + ' to Account ' + acc + ' is being processed by the central bank. Reference: ODIN-' + Math.floor(Math.random() * 1000000));
                document.getElementById('transferModal').style.display = 'none';
            } else {
                alert('Please enter both an account number and an amount.');
            }
        }
    </script>
</body>
</html>
