<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Odin Private Wealth</title>
    <style>
        :root {
            --accent: #3b82f6;
            --bg-dark: #0b0f19;
            --panel: #161e2e;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background: #020617;
            padding: 30px 20px;
            border-right: 1px solid var(--border);
        }

        .brand { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 40px; }
        
        .user-info { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
        .user-info h3 { margin: 0; font-size: 16px; }
        .user-info p { margin: 5px 0 0; font-size: 12px; color: var(--text-dim); }

        .nav-item {
            padding: 12px 15px;
            color: var(--text-dim);
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item.active { background: var(--panel); color: white; }

        /* Main Content */
        .main { flex: 1; padding: 40px; }

        .card {
            background: rgba(22, 30, 46, 0.6);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
        }

        .balance { font-size: 42px; font-weight: bold; margin: 10px 0; letter-spacing: -1px; }

        .tx-list { margin-top: 20px; }
        .tx-item {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        /* Mobile Fixes */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; box-sizing: border-box; }
            .main { padding: 20px; }
            .balance { font-size: 32px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand">ODIN PRIVATE</div>
        <div class="user-info">
            <h3 id="uName">Loading...</h3>
            <p id="uJob">Connecting...</p>
        </div>
        <div class="nav-item active">Overview</div>
        <div class="nav-item">Wire Transfer</div>
        <div class="nav-item">Withdrawal</div>
        <div class="nav-item">Support</div>
    </div>

    <div class="main">
        <div class="card">
            <div style="font-size: 12px; color: var(--text-dim);">TOTAL ACCOUNT BALANCE</div>
            <div class="balance" id="mainBal">$0.00</div>
            <div style="color: #22c55e; font-size: 12px;">Verified Portfolio</div>
        </div>

        <h3>Recent Activity</h3>
        <div class="card" id="ledger">
            <div style="color: var(--text-dim); font-size: 14px;">No transactions recorded yet.</div>
        </div>
    </div>

    <script>
        function syncDashboard() {
            // Get data from Admin Panel
            const name = localStorage.getItem('userName') || "Morris Thomas";
            const job = localStorage.getItem('userJob') || "Oil Rig Engineer";
            const balance = localStorage.getItem('balChk') || "0";
            const history = JSON.parse(localStorage.getItem('user_history') || "[]");

            // Update Screen
            document.getElementById('uName').innerText = name;
            document.getElementById('uJob').innerText = job;
            document.getElementById('mainBal').innerText = "$" + Number(balance).toLocaleString(undefined, {minimumFractionDigits: 2});

            // Update History
            if (history.length > 0) {
                document.getElementById('ledger').innerHTML = history.map(t => `
                    <div class="tx-item">
                        <div>
                            <div style="font-weight:bold; font-size:14px;">${t.desc}</div>
                            <div style="font-size:11px; color:var(--text-dim);">${t.date}</div>
                        </div>
                        <div style="color:${t.amt.includes('+') ? '#22c55e' : '#ef4444'}; font-weight:bold;">${t.amt}</div>
                    </div>
                `).join('');
            }
        }

        // Run sync on load and every 3 seconds
        window.onload = syncDashboard;
        setInterval(syncDashboard, 3000);
    </script>
</body>
</html>
