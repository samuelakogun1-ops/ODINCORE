<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Banking | Odin Central</title>
    <style>
        :root { --main-red: #c0392b; --dark-bg: #0b0f19; --card-bg: rgba(22, 30, 46, 0.9); --text: #ffffff; }
        body { margin: 0; font-family: sans-serif; background: var(--dark-bg); color: var(--text); display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 280px; background: #1a1a1a; padding: 20px; border-right: 1px solid rgba(255,255,255,0.1); }
        .brand { font-size: 22px; font-weight: bold; color: white; margin-bottom: 30px; }
        .nav-item { padding: 15px; cursor: pointer; color: #bbb; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: var(--main-red); color: white; }

        /* Virtual ATM Card */
        .atm-card { background: linear-gradient(135deg, #2c3e50, #000000); padding: 20px; border-radius: 15px; margin-top: 50px; position: relative; border: 1px solid #444; }
        .chip { width: 40px; height: 30px; background: #d4af37; border-radius: 5px; margin-bottom: 20px; }
        .card-num { font-size: 18px; letter-spacing: 2px; margin-bottom: 10px; }

        /* Main Area */
        .content { flex: 1; padding: 40px; background: linear-gradient(to bottom right, #c0392b, #0b0f19); }
        .view { display: none; } .view.active { display: block; }
        .glass-box { background: white; color: black; padding: 30px; border-radius: 20px; margin-top: 20px; }
        .balance-box { background: var(--card-bg); color: white; padding: 40px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        .btn { background: var(--main-red); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="brand">ODIN CENTRAL</div>
    <div style="font-size: 14px; margin-bottom: 20px;"><b id="uName">Morris Thomas</b><br><span style="color:#888" id="uJob">Private Client</span></div>
    
    <div class="nav-item active" onclick="show('v-overview')">Overview</div>
    <div class="nav-item" onclick="show('v-wire')">Wire Transfer</div>
    <div class="nav-item" onclick="show('v-withdraw')">Withdrawal</div>
    <div class="nav-item" onclick="show('v-loan')">Loan Portal</div>

    <div class="atm-card">
        <div class="chip"></div>
        <div class="card-num">**** **** **** 8892</div>
        <div style="display:flex; justify-content:space-between; font-size:10px;">
            <span id="cardHolder">MORRIS THOMAS</span>
            <span>EXP: 12/28</span>
        </div>
    </div>
</div>

<div class="content">
    <div id="v-overview" class="view active">
        <div class="balance-box">
            <div style="font-size:12px; opacity:0.7;">TOTAL ACCOUNT BALANCE</div>
            <h1 id="mainBal" style="font-size:48px; margin:10px 0;">$0.00</h1>
            <div style="color:#22c55e;">● Verified Portfolio</div>
        </div>
        <h3 style="margin-top:30px;">Recent Activity</h3>
        <div id="ledger" style="background:var(--card-bg); padding:20px; border-radius:15px;">No transactions.</div>
    </div>

    <div id="v-wire" class="view">
        <h1>International Wire</h1>
        <div class="glass-box">
            <input type="text" placeholder="Bank Name">
            <input type="text" placeholder="IBAN/Swift">
            <input type="number" placeholder="Amount">
            <button class="btn">Execute Transfer</button>
        </div>
    </div>

    <div id="v-withdraw" class="view">
        <h1>Withdrawal</h1>
        <div class="glass-box">
            <select><option>ATM Card Transfer</option><option>Bank Transfer</option></select>
            <input type="number" placeholder="Amount">
            <button class="btn">Confirm Withdrawal</button>
        </div>
    </div>

    <div id="v-loan" class="view">
        <h1>Loan Application</h1>
        <div class="glass-box">
            <p>Status: <b style="color: #3b82f6;">Active Review</b></p>
            <input type="number" placeholder="Requested Amount">
            <button class="btn">Submit</button>
        </div>
    </div>
</div>

<script>
    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function sync() {
        document.getElementById('uName').innerText = localStorage.getItem('userName') || "Morris Thomas";
        document.getElementById('cardHolder').innerText = (localStorage.getItem('userName') || "Morris Thomas").toUpperCase();
        document.getElementById('uJob').innerText = localStorage.getItem('userJob') || "Private Client";
        const bal = localStorage.getItem('balChk') || "0";
        document.getElementById('mainBal').innerText = "$" + parseFloat(bal).toLocaleString();

        const history = JSON.parse(localStorage.getItem('user_history') || "[]");
        if(history.length > 0) {
            document.getElementById('ledger').innerHTML = history.map(t => `
                <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                    <div><b>${t.desc}</b><br><small>${t.date}</small></div>
                    <div style="color:${t.amt.includes('+')?'#22c55e':'#ef4444'}">${t.amt}</div>
                </div>`).join('');
        }
    }
    window.onload = sync; setInterval(sync, 3000);
</script>
</body>
</html>
