<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Banking | Odin Central Dashboard</title>
    <style>
        :root {
            --odin-red: #ff0000;
            --dark-sidebar: rgba(0, 0, 0, 0.4);
            --glass: rgba(255, 255, 255, 0.98);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--odin-red);
            display: flex;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: var(--dark-sidebar);
            backdrop-filter: blur(15px);
            padding: 25px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 15px;
            display: block;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.2); font-weight: bold; }

        /* MAIN CONTENT */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: linear-gradient(135deg, rgba(255,0,0,0.9) 0%, rgba(120,0,0,1) 100%);
        }

        .glass-panel {
            background: var(--glass);
            color: #333;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        /* CHAT SYSTEM */
        #chatDisplay {
            height: 250px;
            overflow-y: auto;
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eee;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .msg { margin: 5px 0; padding: 10px; border-radius: 8px; max-width: 80%; font-size: 14px; }
        .msg-admin { background: #ffebeb; color: #d00; align-self: flex-start; border-left: 4px solid red; }
        .msg-client { background: #ebf5ff; color: #0056b3; align-self: flex-end; }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-action {
            background: var(--odin-red);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .view { display: none; }
        .active-view { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="letter-spacing:1px;">ODIN CENTRAL</h2>
        <div style="padding-bottom:20px; border-bottom:1px solid rgba(255,255,255,0.2); margin-bottom:20px;">
            <p id="sideName" style="margin:0; font-weight:bold;">Loading...</p>
            <small style="opacity:0.7;">Private Wealth Account</small>
        </div>

        <nav class="nav-links">
            <a onclick="showView('v-home', this)" class="active">📊 Account Overview</a>
            <a onclick="showView('v-transfer', this)">💸 Wire Transfer</a>
            <a onclick="showView('v-support', this)">💬 Priority Support</a>
        </nav>
    </div>

    <div class="main-content">
        
        <div id="v-home" class="view active-view">
            <h1>Portfolio Summary</h1>
            <div class="glass-panel">
                <p style="margin:0; color:#666; font-size:12px; text-transform:uppercase;">Available Balance</p>
                <h1 id="mainBal" style="font-size: 60px; color: var(--odin-red); margin: 10px 0;">$0.00</h1>
                <p id="welcomeUser" style="color:#333; font-weight:600;">Secure Connection Active</p>
            </div>
        </div>

        <div id="v-transfer" class="view">
            <h1>International Transfer</h1>
            <div class="glass-panel">
                <label>Beneficiary Bank</label><input type="text" placeholder="e.g. Deutsche Bank">
                <label>IBAN / Account Number</label><input type="text" placeholder="Enter Details">
                <label>Amount ($)</label><input type="number" placeholder="0.00">
                <button class="btn-action" onclick="handleTransfer()">Confirm & Send Wire</button>
            </div>
        </div>

        <div id="v-support" class="view">
            <h1>Concierge Chat</h1>
            <div class="glass-panel">
                <div id="chatDisplay">
                    <div class="msg msg-admin"><b>System:</b> Secure chat established. A manager is ready to assist.</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="clientChatInput" placeholder="Type your message here...">
                    <button onclick="sendChat()" style="background:red; color:white; border:none; border-radius:8px; padding:0 20px; cursor:pointer;">Send</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        function showView(id, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
            document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
            document.getElementById(id).classList.add('active-view');
            el.classList.add('active');
        }

        // --- LIVE SYNC ENGINE ---
        function sync() {
            // 1. Update Name
            const name = localStorage.getItem('userName') || 'Valued Client';
            document.getElementById('sideName').innerText = name;
            document.getElementById('welcomeUser').innerText = 'Welcome back, ' + name;

            // 2. Update Balance (Live from Admin)
            const rawBal = localStorage.getItem('balChk') || "0";
            const formattedBal = parseFloat(rawBal).toLocaleString('en-US', { minimumFractionDigits: 2 });
            document.getElementById('mainBal').innerText = "$" + formattedBal;

            // 3. Receive Admin Replies
            const reply = localStorage.getItem('admin_reply');
            if(reply) {
                const box = document.getElementById('chatDisplay');
                box.innerHTML += `<div class="msg msg-admin"><b>Manager:</b> ${reply}</div>`;
                box.scrollTop = box.scrollHeight;
                localStorage.removeItem('admin_reply'); // Clear after showing
            }
        }

        // --- CHAT FUNCTIONS ---
        function sendChat() {
            const input = document.getElementById('clientChatInput');
            if(input.value.trim() !== "") {
                const msg = input.value;
                localStorage.setItem('client_to_admin', msg); // Send to Admin
                
                const box = document.getElementById('chatDisplay');
                box.innerHTML += `<div class="msg msg-client"><b>You:</b> ${msg}</div>`;
                box.scrollTop = box.scrollHeight;
                input.value = "";
            }
        }

        // --- TRANSFER SECURITY ---
        function handleTransfer() {
            const mode = localStorage.getItem('transfer_mode') || 'Pending';
            if(mode === 'Visit Bank') {
                alert('ERROR 403: Security restriction. Please visit your local branch to authorize this wire.');
            } else if(mode === 'Pending') {
                alert('PENDING: Transaction received. Verification in progress (ETA 24h).');
            } else {
                alert('SUCCESS: Wire transfer initiated. Transaction ID: #OD' + Math.floor(Math.random()*99999));
            }
        }

        // Run sync every 1 second
        setInterval(sync, 1000);
        window.onload = sync;
    </script>
</body>
</html>
