<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Banking Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .acc-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
        .acc-card { background: white; padding: 20px; border-radius: 12px; border-top: 4px solid #002244; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .acc-card h4 { margin: 0; color: #7f8c8d; font-size: 11px; text-transform: uppercase; }
        .acc-card .amt { font-size: 24px; font-weight: bold; margin-top: 10px; color: #2c3e50; }
        .info-pill { background: #eef2f7; padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 13px; color: #34495e; display: flex; justify-content: space-around; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">ODIN CENTRAL</div>
        <div style="text-align: center; padding: 20px;">
            <img id="dPhoto" src="https://via.placeholder.com/80" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid #2ecc71;">
            <h4 id="dName" style="color: white; margin-top: 10px;">Client</h4>
        </div>
        <nav>
            <a href="#" class="nav-link active">📊 Dashboard</a>
            <a href="#" class="nav-link">💳 Loans</a>
            <a href="#" class="nav-link">🎧 Support</a>
            <a href="index.html" class="nav-link" style="margin-top: 50px; color: #ff7675;">Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <h1>Account Portfolio</h1>
        
        <div class="acc-grid">
            <div class="acc-card"><h4>Current Checking</h4><div class="amt" id="dChk">$0.00</div></div>
            <div class="acc-card"><h4>Savings Account</h4><div class="amt" id="dSav">$0.00</div></div>
            <div class="acc-card"><h4>Personal/Private</h4><div class="amt" id="dPers">$0.00</div></div>
        </div>

        <div class="info-pill">
            <span><b>Gender:</b> <span id="dGender">-</span></span>
            <span><b>DOB:</b> <span id="dDob">-</span></span>
            <span><b>Occupation:</b> <span id="dJob">-</span></span>
            <span><b>Proc. Time:</b> <span id="dTime">-</span></span>
        </div>

        <div class="balance-card" style="margin-top: 25px;">
            <h3>Total Asset Valuation</h3>
            <div class="balance-amount" id="dTotal">$0.00</div>
        </div>
    </div>

    <script>
        function loadProfile() {
            const raw = localStorage.getItem('full_client_data');
            if(!raw) return;
            const data = JSON.parse(raw);
            const curr = data.curr || '$';

            document.getElementById('dName').innerText = data.name;
            document.getElementById('dGender').innerText = data.gender;
            document.getElementById('dDob').innerText = data.dob;
            document.getElementById('dJob').innerText = data.job;
            document.getElementById('dTime').innerText = data.time;

            document.getElementById('dChk').innerText = curr + parseFloat(data.chk).toLocaleString();
            document.getElementById('dSav').innerText = curr + parseFloat(data.sav).toLocaleString();
            document.getElementById('dPers').innerText = curr + parseFloat(data.pers).toLocaleString();

            const total = parseFloat(data.chk) + parseFloat(data.sav) + parseFloat(data.pers);
            document.getElementById('dTotal').innerText = curr + total.toLocaleString();
            
            if(localStorage.getItem('userPhotoURL')) document.getElementById('dPhoto').src = localStorage.getItem('userPhotoURL');
        }
        window.onload = loadProfile;
    </script>
</body>
</html>
