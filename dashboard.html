<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Odin Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link:hover { background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        .sidebar-link.active { background: #3b82f6; color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body class="flex min-h-screen bg-[#f8fafc]">
    <aside class="sticky top-0 hidden h-screen w-72 flex-col border-r border-slate-200 bg-white lg:flex">
        <div class="p-8">
            <div class="flex items-center gap-3">
                <div class="rounded-xl bg-blue-600 p-2"><i class="fas fa-shield-halved text-lg text-white"></i></div>
                <span class="text-xl font-bold uppercase tracking-tight text-slate-800">Odin Private</span>
            </div>
        </div>
        <nav class="flex-grow space-y-2 px-4">
            <p class="mb-4 px-4 text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Main Menu</p>
            <a href="dashboard.html" class="sidebar-link active flex items-center gap-3 rounded-2xl p-4 font-bold"><i class="fas fa-house"></i> Dashboard</a>
            <a href="transfer.html" class="sidebar-link flex items-center gap-3 rounded-2xl p-4 font-bold text-slate-500"><i class="fas fa-paper-plane"></i> Transfers</a>
            <a href="support.html" class="sidebar-link flex items-center gap-3 rounded-2xl p-4 font-bold text-slate-500"><i class="fas fa-headset"></i> Support</a>
            <a href="profile.html" class="sidebar-link flex items-center gap-3 rounded-2xl p-4 font-bold text-slate-500"><i class="fas fa-user-gear"></i> Profile</a>
        </nav>
        <div class="border-t border-slate-100 p-6">
            <a href="login.html" class="flex items-center gap-3 rounded-2xl p-4 font-bold text-red-500 transition hover:bg-red-50"><i class="fas fa-power-off"></i> Logout</a>
        </div>
    </aside>

    <main class="flex-grow">
        <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/80 px-6 py-6 backdrop-blur-md lg:px-8">
            <div class="flex items-center justify-between">
                <div>
                    <h1 id="welcomeName" class="text-xl font-bold text-slate-800">Welcome back</h1>
                    <p class="text-xs text-slate-500">Security status: <span class="font-bold italic text-green-600">Encrypted connection</span></p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="hidden text-right sm:block">
                        <p id="userLabel" class="text-xs font-bold uppercase text-slate-800"></p>
                        <p class="text-[10px] text-slate-400">Account ID: #ODIN-8842-X</p>
                    </div>
                    <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-blue-600 font-bold text-white">MT</div>
                </div>
            </div>
        </header>

        <div class="mx-auto max-w-7xl p-6 lg:p-8">
            <div class="grid gap-8 lg:grid-cols-3">
                <div class="space-y-8 lg:col-span-2">
                    <div class="relative overflow-hidden rounded-[2.5rem] bg-slate-900 p-8 text-white shadow-2xl sm:p-10">
                        <div class="relative z-10">
                            <p class="text-xs font-bold uppercase tracking-[0.25em] text-slate-400">Total available balance</p>
                            <h2 class="mt-4 text-4xl font-bold tracking-tighter sm:text-5xl">$94,250.00</h2>
                            <div class="mt-8 flex flex-wrap gap-4">
                                <a href="transfer.html" class="flex items-center gap-3 rounded-2xl bg-blue-600 px-6 py-3 font-bold transition hover:bg-blue-700"><i class="fas fa-arrow-up-right-from-square"></i> Move Funds</a>
                                <a href="support.html" class="rounded-2xl border border-slate-700 px-6 py-3 font-bold text-slate-300 transition hover:bg-slate-800">Request Support</a>
                            </div>
                        </div>
                        <div class="absolute -right-20 -top-20 h-72 w-72 rounded-full bg-blue-500/10 blur-[100px]"></div>
                    </div>

                    <div class="overflow-hidden rounded-[2.5rem] border border-slate-200 bg-white shadow-sm">
                        <div class="flex items-center justify-between border-b border-slate-100 p-6">
                            <h3 class="text-lg font-bold text-slate-800">Recent activity</h3>
                            <a href="transfer.html" class="text-xs font-bold uppercase tracking-[0.2em] text-blue-600">Create transfer</a>
                        </div>
                        <div id="activityList" class="divide-y divide-slate-50"></div>
                    </div>
                </div>

                <div class="self-start rounded-[2rem] border border-slate-200 bg-gradient-to-br from-slate-800 to-black p-8 text-white shadow-2xl">
                    <div class="mb-10 flex items-start justify-between">
                        <i class="fas fa-microchip text-2xl text-yellow-500"></i>
                        <span class="text-2xl font-black italic opacity-60">VISA</span>
                    </div>
                    <p class="mb-8 font-mono text-2xl tracking-[0.25em]">4421 •••• •••• 9928</p>
                    <div>
                        <p class="text-[9px] uppercase tracking-widest opacity-50">Card holder</p>
                        <p id="cardName" class="text-sm font-bold uppercase tracking-wider"></p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        if (localStorage.getItem('odinAuth') !== 'true') {
            window.location.href = 'login.html';
        }

        const userEmail = localStorage.getItem('odinUser') || 'morris@odinprivate.com';
        const displayName = userEmail.split('@')[0].replace(/\./g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        document.getElementById('welcomeName').textContent = `Welcome back, ${displayName}`;
        document.getElementById('userLabel').textContent = displayName;
        document.getElementById('cardName').textContent = displayName;

        const activityList = document.getElementById('activityList');
        const transactions = JSON.parse(localStorage.getItem('odinTransactions') || '[]');

        if (transactions.length === 0) {
            activityList.innerHTML = `
                <div class="p-6 text-sm text-slate-500">No transfers have been completed yet. Your recent activity will appear here after you dispatch a transfer.</div>
            `;
        } else {
            activityList.innerHTML = transactions.map((item) => `
                <div class="flex items-center justify-between p-6 hover:bg-slate-50">
                    <div class="flex items-center gap-4">
                        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-green-100 text-green-600"><i class="fas fa-arrow-right"></i></div>
                        <div>
                            <p class="font-bold text-slate-800">${item.beneficiary}</p>
                            <p class="text-xs font-medium text-slate-400">${new Date(item.completedAt || item.createdAt).toLocaleString()}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-lg font-bold text-slate-800">$${Number(item.amount).toLocaleString()}</p>
                        <p class="text-[10px] font-bold uppercase text-green-600">${item.status}</p>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
