<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Cards | Odinscafe Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="bg-[#f8fafc] flex min-h-screen">

    <aside class="w-72 bg-white border-r border-slate-200 hidden lg:flex flex-col sticky top-0 h-screen">
        <div class="p-8 flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-xl"><i class="fas fa-shield-halved text-white"></i></div>
            <span class="text-xl font-bold tracking-tight text-slate-800 uppercase">Odinscafe</span>
        </div>
        <nav class="flex-grow px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 p-4 text-slate-500 hover:bg-slate-50 rounded-2xl transition font-bold">
                <i class="fas fa-house"></i> Dashboard
            </a>
            <a href="transfer.html" class="flex items-center gap-3 p-4 text-slate-500 hover:bg-slate-50 rounded-2xl transition font-bold">
                <i class="fas fa-paper-plane"></i> Transfers
            </a>
            <a href="card.html" class="bg-blue-600 text-white flex items-center gap-3 p-4 rounded-2xl transition font-bold shadow-lg shadow-blue-200">
                <i class="fas fa-credit-card"></i> Virtual Cards
            </a>
        </nav>
        <div class="p-6 border-t border-slate-100">
            <a href="login.html" class="flex items-center gap-3 p-4 text-red-500 font-bold"><i class="fas fa-power-off"></i> Logout</a>
        </div>
    </aside>

    <main class="flex-grow">
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-10 px-8 py-6 border-b border-slate-200 flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800">Card Management</h1>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p class="text-xs font-bold text-slate-800 uppercase">Morris Thomas</p>
                    <p class="text-[10px] text-green-500 font-bold">Tier: Elite</p>
                </div>
                <div class="h-12 w-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-bold">MT</div>
            </div>
        </header>

        <div class="p-8 max-w-4xl mx-auto">
            <div class="bg-gradient-to-br from-slate-800 to-black rounded-[2.5rem] p-10 card-shadow relative overflow-hidden aspect-[1.58/1] text-white border border-white/10 mb-12">
                <div class="flex justify-between items-start mb-16 relative z-10">
                    <div class="flex flex-col gap-1">
                        <p class="text-[10px] uppercase tracking-[0.3em] opacity-60">Elite Business</p>
                        <i class="fas fa-microchip text-yellow-500 text-4xl"></i>
                    </div>
                    <span class="font-black italic text-3xl opacity-80">VISA</span>
                </div>
                
                <div class="relative z-10">
                    <p class="text-3xl tracking-[0.2em] font-mono mb-10">4421 8892 0012 9928</p>
                    <div class="flex justify-between items-end">
                        <div>
                            <p class="text-[9px] uppercase tracking-widest opacity-50 mb-1">Card Holder</p>
                            <p class="text-lg font-bold tracking-wider uppercase">Morris Thomas</p>
                        </div>
                        <div class="flex gap-8">
                            <div>
                                <p class="text-[9px] uppercase tracking-widest opacity-50 mb-1">Expires</p>
                                <p class="text-sm font-bold tracking-wider">09/29</p>
                            </div>
                            <div>
                                <p class="text-[9px] uppercase tracking-widest opacity-50 mb-1">CVV</p>
                                <p class="text-sm font-bold tracking-wider">***</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="absolute -right-20 -bottom-20 w-96 h-96 bg-blue-500/10 rounded-full blur-[120px]"></div>
            </div>

            <div class="grid md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-3xl border border-slate-200 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-600">
                            <i class="fas fa-lock"></i>
                        </div>
                        <div>
                            <p class="font-bold text-slate-800">Freeze Card</p>
                            <p class="text-xs text-slate-400">Temporarily disable card</p>
                        </div>
                    </div>
                    <button class="w-12 h-6 bg-slate-200 rounded-full relative">
                        <div class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full shadow-sm"></div>
                    </button>
                </div>

                <div class="bg-white p-6 rounded-3xl border border-slate-200 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600">
                            <i class="fas fa-eye"></i>
                        </div>
                        <div>
                            <p class="font-bold text-slate-800">Show Details</p>
                            <p class="text-xs text-slate-400">View CVV & Number</p>
                        </div>
                    </div>
                    <button class="text-blue-600 font-bold text-xs uppercase">Reveal</button>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
