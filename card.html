<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Cards | Odin Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .card-shadow { box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="flex min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800 text-slate-100">
    <aside class="sticky top-0 hidden h-screen w-72 flex-col border-r border-slate-200 bg-white lg:flex">
        <div class="flex items-center gap-3 p-8"><div class="rounded-xl bg-blue-600 p-2"><i class="fas fa-shield-halved text-white"></i></div><span class="text-xl font-bold uppercase tracking-tight text-slate-800">Odin Private</span></div>
        <nav class="flex-grow space-y-2 px-4">
            <a href="dashboard.html" class="flex items-center gap-3 rounded-2xl p-4 font-bold text-slate-500 transition hover:bg-slate-50"><i class="fas fa-house"></i> Dashboard</a>
            <a href="transfer.html" class="flex items-center gap-3 rounded-2xl p-4 font-bold text-slate-500 transition hover:bg-slate-50"><i class="fas fa-paper-plane"></i> Transfers</a>
            <a href="card.html" class="flex items-center gap-3 rounded-2xl bg-blue-600 p-4 font-bold text-white shadow-lg shadow-blue-200"><i class="fas fa-credit-card"></i> Virtual Cards</a>
            <a href="profile.html" class="flex items-center gap-3 rounded-2xl p-4 font-bold text-slate-500 transition hover:bg-slate-50"><i class="fas fa-user-gear"></i> Profile</a>
        </nav>
        <div class="border-t border-slate-100 p-6"><a href="login.html" class="flex items-center gap-3 p-4 font-bold text-red-500"><i class="fas fa-power-off"></i> Logout</a></div>
    </aside>

    <main class="flex-grow">
        <header class="sticky top-0 z-10 flex items-center justify-between border-b border-slate-200 bg-white/80 px-8 py-6 backdrop-blur-md">
            <h1 class="text-xl font-bold text-slate-800">Card Management</h1>
            <div class="flex items-center gap-4"><div class="text-right"><p class="text-xs font-bold uppercase text-slate-800">Morris Thomas</p><p class="text-[10px] font-bold text-green-500">Tier: Elite</p></div><div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-blue-600 font-bold text-white">MT</div></div>
        </header>

        <div class="mx-auto max-w-4xl p-8">
            <div class="mb-12 overflow-hidden rounded-[2.5rem] border border-white/10 bg-gradient-to-br from-slate-800 to-black p-10 text-white card-shadow">
                <div class="relative z-10 mb-16 flex items-start justify-between">
                    <div class="flex flex-col gap-1"><p class="text-[10px] uppercase tracking-[0.3em] opacity-60">Elite Business</p><i class="fas fa-microchip text-4xl text-yellow-500"></i></div>
                    <span class="text-3xl font-black italic opacity-80">VISA</span>
                </div>
                <div class="relative z-10">
                    <p id="cardNumber" class="mb-10 text-3xl font-mono tracking-[0.2em]">4421 8892 0012 9928</p>
                    <div class="flex items-end justify-between">
                        <div><p class="mb-1 text-[9px] uppercase tracking-widest opacity-50">Card Holder</p><p class="text-lg font-bold uppercase tracking-wider">Morris Thomas</p></div>
                        <div class="flex gap-8"><div><p class="mb-1 text-[9px] uppercase tracking-widest opacity-50">Expires</p><p class="text-sm font-bold tracking-wider">09/29</p></div><div><p class="mb-1 text-[9px] uppercase tracking-widest opacity-50">CVV</p><p id="cardCvv" class="text-sm font-bold tracking-wider">***</p></div></div>
                    </div>
                </div>
                <div class="absolute -bottom-20 -right-20 h-96 w-96 rounded-full bg-blue-500/10 blur-[120px]"></div>
            </div>

            <div class="grid gap-6 md:grid-cols-2">
                <div class="flex items-center justify-between rounded-3xl border border-slate-200 bg-white p-6">
                    <div class="flex items-center gap-4"><div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-slate-100 text-slate-600"><i class="fas fa-lock"></i></div><div><p class="font-bold text-slate-800">Freeze Card</p><p id="freezeStatus" class="text-xs text-slate-400">Temporarily disable card</p></div></div>
                    <button id="freezeBtn" class="relative h-6 w-12 rounded-full bg-slate-200"><div id="freezeHandle" class="absolute left-1 top-1 h-4 w-4 rounded-full bg-white shadow-sm"></div></button>
                </div>
                <div class="flex items-center justify-between rounded-3xl border border-slate-200 bg-white p-6">
                    <div class="flex items-center gap-4"><div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-blue-50 text-blue-600"><i class="fas fa-eye"></i></div><div><p class="font-bold text-slate-800">Show Details</p><p class="text-xs text-slate-400">View CVV & Number</p></div></div>
                    <button id="revealBtn" class="text-xs font-bold uppercase text-blue-600">Reveal</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const freezeBtn = document.getElementById('freezeBtn');
        const freezeHandle = document.getElementById('freezeHandle');
        const freezeStatus = document.getElementById('freezeStatus');
        const revealBtn = document.getElementById('revealBtn');
        const cardNumber = document.getElementById('cardNumber');
        const cardCvv = document.getElementById('cardCvv');

        let frozen = localStorage.getItem('cardFrozen') === 'true';
        let revealed = localStorage.getItem('cardRevealed') === 'true';

        function renderCard() {
            freezeHandle.style.transform = frozen ? 'translateX(18px)' : 'translateX(0px)';
            freezeBtn.style.backgroundColor = frozen ? '#dc2626' : '#e2e8f0';
            freezeStatus.textContent = frozen ? 'Card is frozen' : 'Temporarily disable card';
            revealBtn.textContent = revealed ? 'Hide' : 'Reveal';
            cardNumber.textContent = revealed ? '4421 8892 0012 9928' : '•••• •••• •••• 9928';
            cardCvv.textContent = revealed ? '482' : '***';
        }

        freezeBtn.addEventListener('click', () => {
            frozen = !frozen;
            localStorage.setItem('cardFrozen', frozen);
            renderCard();
        });

        revealBtn.addEventListener('click', () => {
            revealed = !revealed;
            localStorage.setItem('cardRevealed', revealed);
            renderCard();
        });

        renderCard();
    </script>
</body>
</html>
