<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Central | Manager Console</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b1118; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .admin-box { width: 100%; max-width: 550px; background: #1c2631; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid #34495e; }
        h2 { text-align: center; color: #3498db; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        h3 { font-size: 14px; color: #2ecc71; border-bottom: 1px solid #34495e; padding-bottom: 10px; margin-top: 30px; text-transform: uppercase; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #95a5a6; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0b1118; border: 1px solid #34495e; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-purple { background: #9b59b6; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b1118; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: #1c2631; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #34495e; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h2>Manager Access</h2>
            <input type="password" id="adminPass" placeholder="Manager Password" style="width: 280px; text-align: center; font-size: 18px; margin-bottom: 15px;">
            <button onclick="checkPass()" style="width: 280px; background: #3498db; color: white;">Access Console</button>
        </div>
    </div>

    <div class="admin-box">
        <h2>Odin Central Bank</h2>
        
        <h3>1. Client Login Credentials</h3>
        <div class="form-group">
            <label>Account ID / Username (For Login)</label>
            <input type="text" id="regUser" placeholder="e.g. user777">
        </div>
        <div class="form-group">
            <label>Account Password (For Login)</label>
            <input type="text" id="regPass" placeholder="e.g. pass123">
        </div>

        <h3>2. Client Profile Info</h3>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="uName" placeholder="e.g. Samuel A.">
        </div>
        <div class="form-group">
            <label>Virtual Card Number</label>
            <input type="text" id="uCard" placeholder="4400 1234 5678 9012">
        </div>
        <div class="form-group">
            <label>Available Balance ($)</label>
            <input type="number" id="uBal" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>Profile Photo URL</label>
            <input type="text" id="uPhoto" placeholder="Link to image">
        </div>
        <button class="btn-blue" onclick="registerUser()">Register & Save Client</button>

        <h3>3. Transaction Injection</h3>
        <div class="form-group">
            <label>Description</label>
            <input type="text" id="tDesc" placeholder="e.g. Wire Transfer Received">
        </div>
        <div class="form-group">
            <label>Amount (Use '-' for withdrawals)</label>
            <input type="text" id="tAmt" placeholder="e.g. +50,000.00">
        </div>
        <div class="form-group">
            <label>Date & Time Stamp</label>
            <input type="text" id="tDate" placeholder="e.g. Apr 17, 2026 - 09:00 AM">
        </div>
        <button class="btn-purple" onclick="addTx()">Add to History</button>

        <h3>4. Security Controls</h3>
        <div style="display: flex; gap: 10px;">
            <button class="btn-red" onclick="setStatus('frozen')">Freeze Account</button>
            <button class="btn-green" onclick="setStatus('active')">Unfreeze</button>
        </div>
        
        <button style="background:none; color:#e74c3c; font-size:11px; border:1px solid #e74c3c; margin-top:20px;" onclick="clearData()">Wipe All System Data</button>
    </div>

    <script>
        // Password for Admin Console (Default: 1234)
        function checkPass() {
            if(document.getElementById('adminPass').value === '1234') { 
                document.getElementById('loginOverlay').style.display = 'none';
            } else { alert('Access Denied.'); }
        }

        // Register User and Credentials
        function registerUser() {
            const user = document.getElementById('regUser').value;
            const pass = document.getElementById('regPass').value;
            const name = document.getElementById('uName').value;
            const card = document.getElementById('uCard').value;
            const bal = document.getElementById('uBal').value;
            const photo = document.getElementById('uPhoto').value;

            if(user && pass) {
                localStorage.setItem('bank_user', user);
                localStorage.setItem('bank_pass', pass);
                localStorage.setItem('userName', name);
                localStorage.setItem('userCard', card);
                localStorage.setItem('clientBalance', bal);
                localStorage.setItem('userPhotoURL', photo);
                alert('User Registered! They can now login at index.html');
            } else {
                alert('Username and Password are required.');
            }
        }

        // Add Transactions
        function addTx() {
            const desc = document.getElementById('tDesc').value;
            const amt = document.getElementById('tAmt').value;
            const date = document.getElementById('tDate').value;

            if(desc && amt && date) {
                let txs = JSON.parse(localStorage.getItem('transactions')) || [];
                txs.unshift({ desc, amt, date });
                localStorage.setItem('transactions', JSON.stringify(txs));
                alert('Transaction added to client history!');
            }
        }

        function setStatus(status) {
            localStorage.setItem('accStatus', status);
            alert('Security status set to ' + status.toUpperCase());
        }

        function clearData() {
            if(confirm('Wipe everything?')) { localStorage.clear(); location.reload(); }
        }
    </script>
</body>
</html>
