<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Odin Master | System Control</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b1118; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1c2631; padding: 25px; border-radius: 15px; border: 1px solid #34495e; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .section { background: #16202a; padding: 20px; border-radius: 10px; border: 1px solid #2c3e50; margin-bottom: 20px; }
        .full { grid-column: span 2; }
        h3 { color: #2ecc71; text-transform: uppercase; font-size: 14px; border-bottom: 1px solid #2c3e50; padding-bottom: 10px; }
        label { display: block; font-size: 11px; color: #95a5a6; margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; background: #0b1118; border: 1px solid #34495e; color: #fff; border-radius: 5px; margin-top: 5px; }
        button { width: 100%; padding: 14px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        .btn-blue { background: #3498db; }
        .btn-purple { background: #9b59b6; }
        .chat-box { background: #000; border: 1px solid #f1c40f; padding: 15px; border-radius: 8px; color: #f1c40f; font-family: monospace; min-height: 40px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:#3498db;">ODIN MASTER CONTROL</h2>

    <div class="grid">
        <div class="section">
            <h3>👤 User Registration</h3>
            <label>Full Name</label><input type="text" id="regName" placeholder="Client Name">
            <label>Assign Username</label><input type="text" id="regUser" placeholder="Login Username">
            <label>Assign Password</label><input type="text" id="regPass" placeholder="Login Password">
            <button onclick="registerUser()">Register New User</button>
        </div>

        <div class="section">
            <h3>💰 Account Wealth</h3>
            <label>Set Balance ($)</label><input type="number" id="balInput">
            <label>Set Job Title</label><input type="text" id="jobInput" placeholder="e.g. Marine Engineer">
            <button class="btn-blue" onclick="saveFin()">Update Wealth</button>
        </div>

        <div class="section full">
            <h3>📜 Transaction History Editor</h3>
            <div class="grid" style="grid-template-columns: 1fr 1fr 1fr;">
                <div><label>Date & Time</label><input type="text" id="hDate" placeholder="April 17, 2026"></div>
                <div><label>Description</label><input type="text" id="hDesc" placeholder="Inbound Transfer"></div>
                <div><label>Amount (+/-)</label><input type="text" id="hAmt" placeholder="+$50,000"></div>
            </div>
            <button class="btn-purple" onclick="addHistory()">Add to List</button>
        </div>

        <div class="section full">
            <h3>💬 Live Concierge Inbox</h3>
            <div class="chat-box" id="inbox">Waiting for client message...</div>
            <textarea id="reply" rows="2" placeholder="Your reply..."></textarea>
            <button class="btn-blue" onclick="sendReply()">Send Reply to Dashboard</button>
        </div>
    </div>
</div>

<script>
    function registerUser() {
        localStorage.setItem('userName', document.getElementById('regName').value);
        localStorage.setItem('loginUser', document.getElementById('regUser').value);
        localStorage.setItem('loginPass', document.getElementById('regPass').value);
        alert('User Created Successfully');
    }

    function saveFin() {
        localStorage.setItem('balChk', document.getElementById('balInput').value);
        localStorage.setItem('userJob', document.getElementById('jobInput').value);
        alert('Financials Updated');
    }

    function addHistory() {
        let h = JSON.parse(localStorage.getItem('user_history') || "[]");
        h.unshift({ date: document.getElementById('hDate').value, desc: document.getElementById('hDesc').value, amt: document.getElementById('hAmt').value });
        localStorage.setItem('user_history', JSON.stringify(h));
        alert('Transaction Added');
    }

    function sendReply() {
        localStorage.setItem('admin_reply', document.getElementById('reply').value);
        alert('Reply Sent');
    }

    setInterval(() => {
        const m = localStorage.getItem('client_to_admin');
        if(m) document.getElementById('inbox').innerText = "CLIENT: " + m;
    }, 1000);
</script>
</body>
</html>
