<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Wealth Manager | Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b1118; color: white; padding: 20px; display: flex; justify-content: center; }
        .admin-box { width: 100%; max-width: 600px; background: #1c2631; padding: 30px; border-radius: 15px; border: 1px solid #34495e; }
        h2 { text-align: center; color: #3498db; text-transform: uppercase; margin-bottom: 20px; }
        h3 { font-size: 14px; color: #2ecc71; border-bottom: 1px solid #34495e; padding-bottom: 5px; margin-top: 25px; text-transform: uppercase; }
        label { display: block; font-size: 11px; color: #95a5a6; margin-top: 10px; }
        input, select { width: 100%; padding: 12px; background: #0b1118; border: 1px solid #34495e; color: white; border-radius: 5px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; background: #3498db; color: white; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b1118; display: flex; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div style="text-align: center; background: #1c2631; padding: 40px; border-radius: 15px; border: 1px solid #34495e;">
            <h2>Manager Access</h2>
            <input type="password" id="adminPass" placeholder="Password" style="width: 200px; text-align: center;">
            <button onclick="checkPass()" style="width: 200px;">Login</button>
        </div>
    </div>

    <div class="admin-box">
        <h2>System Controller</h2>
        
        <h3>1. Personal Identity</h3>
        <div class="grid">
            <div><label>Full Name</label><input type="text" id="uName"></div>
            <div><label>Occupation</label><input type="text" id="uJob"></div>
        </div>
        <div class="grid">
            <div><label>Date of Birth</label><input type="date" id="uDob"></div>
            <div>
                <label>Gender</label>
                <select id="uGender">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        </div>

        <h3>2. Account Balances</h3>
        <div class="grid">
            <div><label>Main Checking ($)</label><input type="number" id="balChecking"></div>
            <div><label>Savings Account ($)</label><input type="number" id="balSavings"></div>
        </div>
        <div class="grid">
            <div><label>Personal/Private ($)</label><input type="number" id="balPersonal"></div>
            <div>
                <label>Currency</label>
                <select id="uCurr">
                    <option value="$">USD ($)</option>
                    <option value="€">EUR (€)</option>
                    <option value="£">GBP (£)</option>
                </select>
            </div>
        </div>

        <h3>3. Processing Details</h3>
        <label>Transaction Processing Time</label>
        <input type="text" id="procTime" placeholder="e.g. 2-3 Business Days">

        <button onclick="saveAll()">Update Client Profile</button>
    </div>

    <script>
        function checkPass() { if(document.getElementById('adminPass').value === '1234') document.getElementById('loginOverlay').style.display='none'; }

        function saveAll() {
            const data = {
                name: document.getElementById('uName').value,
                job: document.getElementById('uJob').value,
                dob: document.getElementById('uDob').value,
                gender: document.getElementById('uGender').value,
                chk: document.getElementById('balChecking').value,
                sav: document.getElementById('balSavings').value,
                pers: document.getElementById('balPersonal').value,
                curr: document.getElementById('uCurr').value,
                time: document.getElementById('procTime').value
            };
            localStorage.setItem('full_client_data', JSON.stringify(data));
            alert('Full Profile Synchronized!');
        }
    </script>
</body>
</html>
