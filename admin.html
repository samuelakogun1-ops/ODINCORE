<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin | Super Admin Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; display: flex; gap: 20px; }
        .panel { background: #1e293b; padding: 25px; border-radius: 15px; flex: 1; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #3b82f6; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-size: 13px; color: #94a3b8; }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        /* Chat Section */
        #chatBox { height: 300px; background: #0f172a; border-radius: 10px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 8px; max-width: 80%; font-size: 14px; }
        .user-msg { background: #334155; align-self: flex-start; }
        .admin-msg { background: #2563eb; align-self: flex-end; }
    </style>
</head>
<body>

<div class="panel">
    <h2>Account & Profile</h2>
    <label>Profile Picture URL</label>
    <input type="text" id="pfpUrl" placeholder="Paste image link here">
    
    <label>Account Balance ($)</label>
    <input type="number" id="accBal">
    
    <button onclick="updateProfile()">SAVE SETTINGS</button>
    <p id="status" style="font-size:12px; color:#10b981; text-align:center;"></p>
</div>

<div class="panel">
    <h2>Customer Support Chat</h2>
    <div id="chatBox"></div>
    <input type="text" id="replyMsg" placeholder="Type your response..." style="margin-top:15px;">
    <button onclick="sendReply()" style="background: #10b981;">SEND TO USER</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCDVHNccAM1jv5WppHFxygIfuCDDL1eIcc",
      authDomain: "odin-private.firebaseapp.com",
      projectId: "odin-private",
      storageBucket: "odin-private.firebasestorage.app",
      messagingSenderId: "1023424168524",
      appId: "1:1023424168524:web:d5d3354cf3ba5433f7aae9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("accounts").doc("morris_thomas");

    // Load Data in Real-time
    docRef.onSnapshot((doc) => {
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('accBal').value = data.balance;
            document.getElementById('pfpUrl').value = data.pfpUrl || "";
            
            // Show Chat
            let chatHtml = "";
            if (data.support_chat) {
                data.support_chat.forEach(m => {
                    chatHtml += `<div class="msg ${m.role}-msg"><b>${m.role.toUpperCase()}:</b><br>${m.text}</div>`;
                });
            }
            const box = document.getElementById('chatBox');
            box.innerHTML = chatHtml;
            box.scrollTop = box.scrollHeight;
        }
    });

    function updateProfile() {
        const bal = document.getElementById('accBal').value;
        const pfp = document.getElementById('pfpUrl').value;
        docRef.update({
            balance: Number(bal),
            pfpUrl: pfp
        }).then(() => { document.getElementById('status').innerText = "✅ Updated Successfully!"; });
    }

    function sendReply() {
        const text = document.getElementById('replyMsg').value;
        if (!text) return;
        
        docRef.update({
            support_chat: firebase.firestore.FieldValue.arrayUnion({
                role: "admin",
                text: text,
                time: new Date().toLocaleTimeString()
            })
        }).then(() => { document.getElementById('replyMsg').value = ""; });
    }
</script>
</body>
</html>
