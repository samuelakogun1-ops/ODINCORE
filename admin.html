<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Central | Manager Console</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b1118; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .admin-box { width: 100%; max-width: 550px; background: #1c2631; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid #34495e; }
        h2 { text-align: center; color: #3498db; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }
        h3 { font-size: 16px; color: #2ecc71; border-bottom: 1px solid #34495e; padding-bottom: 10px; margin-top: 30px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: #95a5a6; margin-bottom: 5px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; background: #0b1118; border: 1px solid #34495e; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn-blue { background: #3498db; color: white; }
        .btn-purple { background: #9b59b6; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-green { background: #2ecc71; color: white; }
        
        /* Security Overlay */
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b1118; display: flex; justify-content: center; align-items: center; z-index: 10000; }
        .login-card { background: #1c2631; padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #34495e; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="login-card">
            <h2 style="margin-top:0;">Manager Access</h2>
            <p style="color: #95a5a6; font-size: 14px;">Please enter your administrative credentials.</p>
            <input type="password" id="adminPass" placeholder="Manager Password" style="width: 280px; text-align: center; font-size: 18px;">
            <button onclick="checkPass()" style="width: 280px; background: #3498db; color: white;">Login to Console</button>
        </div>
    </div>

    <div class="admin-box">
        <h2>Odin Central Bank</h2>
        <p style="text-align:center; color:#95a5a6; font-size:12px;">Global Wealth Management Controller</p>
        
        <div class="form-group">
            <h3>User Registration & Profile</h3>
            <label>Client Full Name</label>
            <input type="text" id="uName" placeholder="e.g. John Doe">
        </div>
        <div class="form-group">
            <label>Virtual Card Number</label>
            <input type="text" id="uCard" placeholder="4400 1234 5678 9012">
        </div>
        <div class="form-group">
            <label>Available Balance ($)</label>
            <input type="number" id="uBal" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>Profile Photo Link</label>
            <input type="text" id="uPhoto" placeholder="Paste image URL here">
        </div>
        <button class="btn-blue" onclick="saveUser()">Update Client Profile</button>

        <div class="form-group">
            <h3>Manual Transaction Entry</h3>
            <label>Description (Merchant / Type)</label>
            <input type="text" id="tDesc" placeholder="e.g. Amazon Intl Purchase">
        </div>
        <div class="form-group">
            <label>Amount (Use '-' for withdrawals)</label>
            <input type="text" id="tAmt" placeholder="e.g. -120.50 or +5000.00">
        </div>
        <div class="form-group">
            <label>Date & Time Stamp</label>
            <input type="text" id="tDate" placeholder="e.g. Apr 17, 2026 - 09:45 AM">
        </div>
        <button class="btn-purple" onclick="addTx()">Inject Transaction</button>

        <div class="form-group">
            <h3>System Controls</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn-red" onclick="setStatus('frozen')">Freeze Account</button>
                <button class="btn-green" onclick="setStatus('active')">Unfreeze</button>
            </div>
        </div>
        
        <button style="background:none; color:#e74c3c; font-size:11px; border:1px solid #e74c3c; margin-top:20px;" onclick="clearData()">Wipe All System Data</button>
    </div>

    <script>
        // 1. PASSWORD CHECK (Current password is: 1234)
        function checkPass() {
            const pass = document.getElementById('adminPass').value;
            if(pass === '1234') { 
                document.getElementById('loginOverlay').style.display = 'none';
            } else { 
                alert('Invalid Credentials. Unauthorized access logged.'); 
            }
        }

        // 2. SAVE USER PROFILE
        function saveUser() {
            localStorage.setItem('userName', document.getElementById('uName').value);
            localStorage.setItem('userCard', document.getElementById('uCard').value);
            localStorage.setItem('clientBalance', document.getElementById('uBal').value);
            localStorage.setItem('userPhotoURL', document.getElementById('uPhoto').value);
            alert('Client Profile Updated Successfully!');
        }

        // 3. ADD CUSTOM TRANSACTION
        function addTx() {
            const desc = document.getElementById('tDesc').value;
            const amt = document.getElementById('tAmt').value;
            const date = document.getElementById('tDate').value;

            if(desc && amt && date) {
                let txs = JSON.parse(localStorage.getItem('transactions')) || [];
                txs.unshift({ desc, amt, date }); // Adds new transaction to the top
                localStorage.setItem('transactions', JSON.stringify(txs));
                alert('Transaction Injected into History!');
                
                // Clear inputs for next entry
                document.getElementById('tDesc').value = '';
                document.getElementById('tAmt').value = '';
                document.getElementById('tDate').value = '';
            } else {
                alert('Please fill all transaction fields.');
            }
        }

        // 4. SECURITY STATUS
        function setStatus(status) {
            localStorage.setItem('accStatus', status);
            alert('Account security status set to: ' + status.toUpperCase());
        }

        // 5. RESET DATA
        function clearData() {
            if(confirm('Are you sure? This will delete the user and all history.')) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
