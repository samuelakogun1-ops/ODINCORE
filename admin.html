<script>
    // Listen for customer messages
    setInterval(() => {
        const incoming = localStorage.getItem('customer_msg');
        if(incoming) {
            const chatDisplay = document.getElementById('admin-chat-display');
            chatDisplay.innerHTML = `<div class="mb-2"><span class="badge bg-primary">USER:</span> ${incoming}</div>`;
            // Clear message once seen if desired, or keep it displayed
        }
    }, 1000);

    function sendAdminReply() {
        const reply = document.getElementById('admin-reply-input').value;
        if(!reply) return;
        const chatDisplay = document.getElementById('admin-chat-display');
        chatDisplay.innerHTML += `<div class="mb-2 text-success"><span class="badge bg-success">ADMIN:</span> ${reply}</div>`;
        document.getElementById('admin-reply-input').value = '';
        // In this local setup, user doesn't see "replies" unless you use a real database
    }
</script>
