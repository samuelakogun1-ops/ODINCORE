<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Odin Central | Manager Console</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b1118; color: white; padding: 20px; display: flex; justify-content: center; }
        .admin-box { width: 100%; max-width: 550px; background: #1c2631; padding: 30px; border-radius: 15px; border: 1px solid #34495e; }
        h2 { text-align: center; color: #3498db; text-transform: uppercase; margin-bottom: 25px; }
        h3 { font-size: 14px; color: #2ecc71; border-bottom: 1px solid #34495e; padding-bottom: 5px; margin-top: 25px; }
        label { display: block; font-size: 11px; color: #95a5a6; margin-top: 10px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background: #0b1118; border: 1px solid #34495e; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; background: #3498db; color: white; }
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b1118; display: flex; justify-content: center; align-items: center; z-index: 10000; }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div style="text-align: center; background: #1c2631; padding: 40px; border-radius: 15px; border: 1px solid #34495e;">
            <h2>Manager Access</h2>
            <input type="password" id="adminPass" placeholder="Password" style="width: 200px; text-align: center;">
            <button onclick="checkPass()" style="width: 200px;">Login</button>
        </div>
    </div>

    <div class="admin-box">
        <h2>System Controller</h2>
        
        <h3>1. Registration & Identity</h3>
        <label>Account ID / Username (Login)</label>
        <input type="text" id="regUser">
        <label>Account Password (Login)</label>
        <input type="text" id="regPass">
        <label>Full Name</label>
        <input type="text" id="uName">
        <label>Occupation</label>
        <input type="text" id="uJob">
        <label>Date of Birth</label>
        <input type="text" id="uDob" placeholder="e.g. 12 May 1985">
        <label>Gender</label>
        <select id="uGender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <h3>2. Account Balances</h3>
        <label>Current Checking Balance</label>
        <input type="number" id="balChecking">
        <label>Savings Account Balance</label>
        <input type="number" id="balSavings">
        <label>Personal Account Balance</label>
        <input type="number" id="balPersonal">
        <label>Account Currency</label>
        <select id="uCurr">
            <option value="$">USD ($)</option>
            <option value="€">EUR (€)</option>
            <option value="£">GBP (£)</option>
        </select>

        <h3>3. Card & Processing</h3>
        <label>Virtual Card Number</label>
        <input type="text" id="uCard" placeholder="4400 0000 0000 0000">
        <label>Processing Time</label>
        <input type="text" id="procTime" placeholder="e.g. 24 - 48 Hours">
        <label>Photo URL</label>
        <input type="text" id="uPhoto">

        <button onclick="saveAll()">Register & Synchronize</button>
    </div>

    <script>
        function checkPass() { if(document.getElementById('adminPass').value === '1234') document.getElementById('loginOverlay').style.display='none'; }

        function saveAll() {
            localStorage.setItem('bank_user', document.getElementById('regUser').value);
            localStorage.setItem('bank_pass', document.getElementById('regPass').value);
            localStorage.setItem('userName', document.getElementById('uName').value);
            localStorage.setItem('userJob', document.getElementById('uJob').value);
            localStorage.setItem('userDob', document.getElementById('uDob').value);
            localStorage.setItem('userGender', document.getElementById('uGender').value);
            localStorage.setItem('userCard', document.getElementById('uCard').value);
            localStorage.setItem('userPhotoURL', document.getElementById('uPhoto').value);
            localStorage.setItem('procTime', document.getElementById('procTime').value);
            localStorage.setItem('currency', document.getElementById('uCurr').value);
            
            localStorage.setItem('balChk', document.getElementById('balChecking').value);
            localStorage.setItem('balSav', document.getElementById('balSavings').value);
            localStorage.setItem('balPers', document.getElementById('balPersonal').value);
            
            alert('User Profile and All Accounts Updated!');
        }
    </script>
</body>
</html>
