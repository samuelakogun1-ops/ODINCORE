<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center | Odinscafe Internal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .admin-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        /* Modal Overlay */
        #topupModal { display: none; }
    </style>
</head>
<body class="bg-[#020617] text-slate-300 flex min-h-screen">

    <aside class="w-72 bg-slate-950 border-r border-slate-800 flex flex-col sticky top-0 h-screen">
        <div class="p-8 border-b border-slate-800">
            <div class="flex items-center gap-3">
                <div class="bg-red-600 p-2 rounded-lg">
                    <i class="fas fa-terminal text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-tighter">ODIN<span class="text-red-500 text-sm">ROOT</span></h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Superuser Access</p>
                </div>
            </div>
        </div>

        <nav class="flex-grow p-4 space-y-1">
            <a href="#" onclick="alert('Analytics Active')" class="flex items-center gap-3 p-3 text-white bg-slate-900 rounded-xl">
                <i class="fas fa-chart-line text-blue-400"></i> Analytics Overview
            </a>
            <a href="#" onclick="alert('Loading User Database...')" class="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl transition">
                <i class="fas fa-users-gear text-slate-400"></i> User Management
            </a>
            <a href="#" onclick="alert('Accessing Vaults...')" class="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl transition">
                <i class="fas fa-vault text-amber-500"></i> Bank Vaults
            </a>
        </nav>

        <div class="p-6 border-t border-slate-800">
            <a href="login.html" class="flex items-center gap-3 p-3 text-red-400 font-bold text-sm">
                <i class="fas fa-power-off"></i> System Exit
            </a>
        </div>
    </aside>

    <main class="flex-grow">
        <header class="bg-slate-950/50 backdrop-blur-md sticky top-0 z-10 px-8 py-6 border-b border-slate-800 flex justify-between items-center">
            <span class="bg-green-500/10 text-green-500 px-3 py-1 rounded-full text-[10px] font-bold flex items-center gap-2">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> SERVER: ONLINE
            </span>
            <div class="text-right">
                <p class="text-sm font-bold text-white">Administrator</p>
                <p class="text-[10px] text-slate-500 font-mono">192.168.1.1</p>
            </div>
        </header>

        <div class="p-8">
            <div class="grid lg:grid-cols-4 gap-6 mb-8">
                <div class="admin-gradient p-6 rounded-2xl border border-slate-800 shadow-xl">
                    <p class="text-slate-500 text-xs font-bold uppercase mb-2">Total Reserve</p>
                    <h3 class="text-2xl font-bold text-white mono" id="totalReserve">$14,250,800</h3>
                </div>
            </div>

            <div class="bg-slate-950 rounded-3xl border border-slate-800 overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                    <h3 class="text-lg font-bold text-white">User Control Directory</h3>
                </div>
                
                <table class="w-full text-left">
                    <thead class="text-slate-500 text-[10px] uppercase tracking-widest border-b border-slate-800 bg-slate-950">
                        <tr>
                            <th class="px-6 py-4">User</th>
                            <th class="px-6 py-4">Balance</th>
                            <th class="px-6 py-4 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-800">
                        <tr class="hover:bg-slate-900/40">
                            <td class="px-6 py-4">
                                <p class="font-bold text-slate-200">Samuel Okogun</p>
                                <p class="text-[10px] text-slate-500 mono">#ODIN-8842-X</p>
                            </td>
                            <td class="px-6 py-4">
                                <p class="text-green-500 font-bold mono" id="samuelBalance">$84,250.00</p>
                            </td>
                            <td class="px-6 py-4 text-right space-x-2">
                                <button onclick="openTopup('Samuel Okogun')" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg text-[10px] font-bold transition">
                                    TOP UP
                                </button>
                                <button onclick="alert('Account #ODIN-8842-X has been placed on HOLD.')" class="bg-amber-500/10 text-amber-500 hover:bg-amber-500 hover:text-white px-3 py-1.5 rounded-lg text-[10px] font-bold border border-amber-500/20 transition">
                                    HOLD
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="topupModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-3xl p-8 shadow-2xl">
            <h3 class="text-xl font-bold text-white mb-2">Manual Account Top-Up</h3>
            <p class="text-slate-500 text-sm mb-6">User: <span id="targetUser" class="text-blue-400 font-bold"></span></p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2">Credit Amount ($)</label>
                    <input type="number" id="topupAmount" placeholder="5000.00" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:outline-none focus:border-blue-500 font-mono text-xl">
                </div>
                <button onclick="executeTopup()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-bold transition shadow-lg shadow-blue-900/20">
                    Confirm Credit
                </button>
                <button onclick="closeModal()" class="w-full bg-transparent text-slate-500 py-2 text-sm font-bold hover:text-white transition">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script>
        function openTopup(name) {
            document.getElementById('targetUser').innerText = name;
            document.getElementById('topupModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('topupModal').style.display = 'none';
        }

        function executeTopup() {
            const amount = document.getElementById('topupAmount').value;
            if (amount <= 0) {
                alert("Please enter a valid amount.");
                return;
            }
            
            // This is where the "Magic" happens visually
            alert(`SUCCESS: Credited $${amount} to Samuel Okogun.`);
            
            // Update the display balance temporarily (it resets on refresh)
            const currentBal = 84250.00;
            const newBal = currentBal + parseFloat(amount);
            document.getElementById('samuelBalance').innerText = `$${newBal.toLocaleString()}.00`;
            
            closeModal();
        }
    </script>
</body>
</html>
