<!DOCTYPE html>
<html>
<head>
    <title>Odin | Remote Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Global Remote Control</h2>
    <input type="text" id="newName" placeholder="Account Name (e.g. Morris Thomas)">
    <input type="number" id="newBal" placeholder="New Balance (e.g. 50000)">
    <button onclick="updateGlobal()">UPDATE WORLDWIDE</button>

    <script>
        // PASTE THE SAME KEYS HERE
        const firebaseConfig = {
            // [PASTE YOUR KEYS HERE FROM FIREBASE SETTINGS]
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function updateGlobal() {
            const name = document.getElementById('newName').value;
            const bal = document.getElementById('newBal').value;

            db.collection("accounts").doc("morris_thomas").set({
                name: name,
                balance: bal,
                transactions: [
                    { desc: "Initial Deposit", date: "April 2026", amount: bal, type: "plus" },
                    { desc: "Server Maintenance", date: "April 2026", amount: "150.00", type: "minus" }
                ]
            }).then(() => alert("Data Sent to Cloud! Check your USA browser."));
        }
    </script>
</body>
</html>
