<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin | Global Control Tower</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; padding: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
        .panel { background: #1e293b; padding: 25px; border-radius: 15px; flex: 1; min-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { color: #3b82f6; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-top:0; }
        label { display: block; margin: 15px 0 5px; font-size: 12px; color: #94a3b8; font-weight: bold; }
        input, select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #1d4ed8; }
        
        /* Chat Styling */
        #chatBox { height: 350px; background: #0f172a; border-radius: 10px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #334155; }
        .msg { padding: 10px; border-radius: 8px; max-width: 85%; font-size: 14px; line-height: 1.4; }
        .user-msg { background: #334155; align-self: flex-start; color: #e2e8f0; }
        .admin-msg { background: #2563eb; align-self: flex-end; color: white; }
        .time { font-size: 10px; opacity: 0.6; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="panel">
    <h2>Account Controls</h2>
    <label>PROFILE PICTURE URL</label>
    <input type="text" id="pfpUrl" placeholder="Paste .jpg or .png link here">
    
    <label>CURRENT BALANCE ($)</label>
    <input type="number" id="accBal">

    <label>TRANSFER STATUS (GLOBAL)</label>
    <select id="tStatus">
        <option value="Successful">✅ Successful</option>
        <option value="Pending">⏳ Pending / Verifying</option>
        <option value="Declined">❌ Declined / Security Hold</option>
        <option value="Branch">🏦 Visit Nearest Branch</option>
    </select>
    
    <button onclick="updateGlobalSettings()">UPDATE WORLDWIDE</button>
    <p id="statusMsg" style="font-size:12px; text-align:center; margin-top:10px; color:#10b981;"></p>
</div>

<div class="panel">
    <h2>Customer Support Live</h2>
    <div id="chatBox"></div>
    <div style="display:flex; gap:10px; margin-top:15px;">
        <input type="text" id="replyMsg" placeholder="Type response to Morris...">
        <button onclick="sendReply()" style="margin:0; width: 80px; padding:0;">SEND</button>
    </div>
    <button onclick="clearChat()" style="background:#ef4444; margin-top:10px; font-size:11px; padding:8px;">CLEAR CHAT HISTORY</button>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyCDVHNccAM1jv5WppHFxygIfuCDDL1eIcc",
      authDomain: "odin-private.firebaseapp.com",
      projectId: "odin-private",
      storageBucket: "odin-private.firebasestorage.app",
      messagingSenderId: "1023424168524",
      appId: "1:1023424168524:web:d5d3354cf3ba5433f7aae9"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection("accounts").doc("morris_thomas");

    // Real-time listener for the Admin Panel
    docRef.onSnapshot((doc) => {
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('accBal').value = data.balance || 0;
            document.getElementById('pfpUrl').value = data.pfpUrl || "";
            document.getElementById('tStatus').value = data.transfer_status || "Successful";
            
            // Build the Chat
            let chatHtml = "";
            if (data.support_chat && data.support_chat.length > 0) {
                data.support_chat.forEach(m => {
                    const isUser = m.role === 'user';
                    chatHtml += `
                        <div class="msg ${isUser ? 'user-msg' : 'admin-msg'}">
                            <b>${isUser ? 'MORRIS' : 'YOU'}:</b><br>${m.text}
                            <span class="time">${m.time || ''}</span>
                        </div>`;
                });
            } else {
                chatHtml = '<p style="text-align:center; color:#64748b; font-size:12px;">No active messages.</p>';
            }
            const box = document.getElementById('chatBox');
            box.innerHTML = chatHtml;
            box.scrollTop = box.scrollHeight;
        }
    });

    function updateGlobalSettings() {
        const bal = document.getElementById('accBal').value;
        const pfp = document.getElementById('pfpUrl').value;
        const status = document.getElementById('tStatus').value;
        
        docRef.update({
            balance: Number(bal),
            pfpUrl: pfp,
            transfer_status: status
        }).then(() => { 
            document.getElementById('statusMsg').innerText = "✅ Global data updated!";
            setTimeout(() => document.getElementById('statusMsg').innerText = "", 3000);
        });
    }

    function sendReply() {
        const text = document.getElementById('replyMsg').value;
        if (!text) return;
        
        docRef.update({
            support_chat: firebase.firestore.FieldValue.arrayUnion({
                role: "admin",
                text: text,
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
            })
        }).then(() => { document.getElementById('replyMsg').value = ""; });
    }

    function clearChat() {
        if(confirm("Delete all messages?")) {
            docRef.update({ support_chat: [] });
        }
    }
</script>
</body>
</html>
