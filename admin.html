<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank Admin | Odin's Bank</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 50px; text-align: center; }
        .box { background: #2c3e50; padding: 30px; border-radius: 15px; display: inline-block; width: 400px; border: 2px solid #3498db; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-update { background: #3498db; color: white; }
        .btn-freeze { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Admin Control Panel</h2>
        <input type="number" id="newBal" placeholder="Set Client Balance">
        <button class="btn-update" onclick="setBal()">Update Balance</button>
        <hr>
        <button class="btn-freeze" onclick="freeze()">Freeze Account</button>
        <button style="background:#2ecc71; color:white;" onclick="unfreeze()">Unfreeze Account</button>
    </div>

    <script>
        function setBal() {
            const b = document.getElementById('newBal').value;
            localStorage.setItem('clientBalance', b);
            alert('Balance set to: $' + b);
        }
        function freeze() {
            localStorage.setItem('accStatus', 'frozen');
            alert('ACCOUNT FROZEN');
        }
        function unfreeze() {
            localStorage.setItem('accStatus', 'active');
            alert('ACCOUNT ACTIVE');
        }
    </script>
</body>
</html>
