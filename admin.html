<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Central | System Controller</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b1118; color: white; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .admin-box { width: 100%; max-width: 600px; background: #1c2631; padding: 30px; border-radius: 15px; border: 1px solid #34495e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { text-align: center; color: #3498db; text-transform: uppercase; margin-bottom: 30px; border-bottom: 2px solid #34495e; padding-bottom: 10px; }
        
        .section { background: #16202a; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #2c3e50; }
        h3 { font-size: 14px; color: #2ecc71; margin-top: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        label { display: block; font-size: 11px; color: #95a5a6; margin-top: 10px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; background: #0b1118; border: 1px solid #34495e; color: #fff; border-radius: 5px; box-sizing: border-box; margin-top: 5px; outline: none; }
        
        /* CHAT INBOX STYLE */
        .chat-inbox { background: #000; border: 1px solid #2ecc71; padding: 15px; border-radius: 8px; min-height: 50px; margin: 10px 0; color: #2ecc71; font-family: monospace; }
        
        button { width: 100%; padding: 16px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.3s; font-size: 15px; }
        button:hover { background: #27ae60; transform: translateY(-2px); }
        .btn-blue { background: #3498db; }
        .btn-blue:hover { background: #2980b9; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Odin Manager Panel</h2>
        
        <div class="section">
            <h3>💰 Financial Control</h3>
            <label>Set Total Account Balance (Numbers Only)</label>
            <input type="number" id="balInput" placeholder="e.g. 1050700">
            <button onclick="updateBalance()">Update Client Balance</button>
        </div>

        <div class="section">
            <h3>💬 Client Message Inbox</h3>
            <label>Message received from client:</label>
            <div class="chat-inbox" id="incomingMsg">Waiting for client message...</div>
            
            <label>Your Reply to Client</label>
            <textarea id="adminReplyText" rows="3" placeholder="Type your response here..."></textarea>
            <button class="btn-blue" onclick="sendReply()">Send Reply to Dashboard</button>
        </div>

        <div class="section">
            <h3>👤 Profile & Security</h3>
            <label>Client Full Name</label>
            <input type="text" id="clientName" placeholder="Update Name">
            <label>Transfer Policy</label>
            <select id="tMode">
                <option value="Successful">Allow All Transfers</option>
                <option value="Pending">Force 'Pending' Status</option>
                <option value="Visit Bank">Force 'Visit Bank' Error</option>
            </select>
            <button onclick="updateProfile()">Update Profile Settings</button>
        </div>
    </div>

    <script>
        // 1. UPDATE BALANCE
        function updateBalance() {
            const val = document.getElementById('balInput').value;
            if(val) {
                localStorage.setItem('balChk', val);
                alert('Balance updated to $' + parseFloat(val).toLocaleString());
            }
        }

        // 2. CHAT SYSTEM
        function sendReply() {
            const reply = document.getElementById('adminReplyText').value;
            if(reply) {
                localStorage.setItem('admin_reply', reply);
                alert('Reply sent to client support chat!');
                document.getElementById('adminReplyText').value = '';
            }
        }

        // AUTO-CHECK FOR CLIENT MESSAGES
        setInterval(() => {
            const msg = localStorage.getItem('client_to_admin');
            if(msg) {
                document.getElementById('incomingMsg').innerText = "CLIENT SAYS: " + msg;
                document.getElementById('incomingMsg').style.borderColor = "#f1c40f"; // Highlight new msg
            }
        }, 1000);

        // 3. PROFILE UPDATES
        function updateProfile() {
            localStorage.setItem('userName', document.getElementById('clientName').value);
            localStorage.setItem('transfer_mode', document.getElementById('tMode').value);
            alert('Profile and Security settings synchronized.');
        }

        // Load existing data
        window.onload = function() {
            document.getElementById('balInput').value = localStorage.getItem('balChk');
            document.getElementById('clientName').value = localStorage.getItem('userName');
        }
    </script>
</body>
</html>
