<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin | Master Control Panel</title>
    <style>
        :root { --cobalt: #2563eb; --slate: #0f172a; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; margin: 0; padding: 40px; color: #1e293b; }
        .admin-container { max-width: 600px; margin: auto; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        h2 { margin-top: 0; color: var(--slate); border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        .section { margin-bottom: 25px; }
        .label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; transition: 0.2s; }
        input:focus { border-color: var(--cobalt); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .btn-save { background: var(--cobalt); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn-save:hover { background: #1d4ed8; }
        .status-msg { text-align: center; margin-top: 15px; font-size: 14px; font-weight: 600; display: none; }
        .success { color: #059669; }
    </style>
</head>
<body>

<div class="admin-container">
    <h2>Master Configuration</h2>
    
    <div class="section">
        <span class="label">Client Full Name</span>
        <input type="text" id="adminName" placeholder="e.g. Morris Thomas">
    </div>

    <div class="section">
        <span class="label">Login Username</span>
        <input type="text" id="adminUser" placeholder="Set login username">
    </div>

    <div class="section">
        <span class="label">Login Password</span>
        <input type="text" id="adminPass" placeholder="Set login password">
    </div>

    <div class="section">
        <span class="label">Total Account Balance ($)</span>
        <input type="number" id="adminBal" placeholder="1000000">
    </div>

    <button class="btn-save" onclick="updateSystem()">Update Client Dashboard</button>
    <div id="status" class="status-msg success">✓ System Updated Successfully</div>
</div>

<script>
    // Function to save everything to localStorage
    function updateSystem() {
        const name = document.getElementById('adminName').value;
        const user = document.getElementById('adminUser').value;
        const pass = document.getElementById('adminPass').value;
        const bal = document.getElementById('adminBal').value;

        // Force save to the correct keys used by login.html and dashboard.html
        if(name) localStorage.setItem('displayName', name);
        if(user) localStorage.setItem('loginUser', user);
        if(pass) localStorage.setItem('loginPass', pass);
        if(bal) localStorage.setItem('balChk', bal);

        // Show success message
        const status = document.getElementById('status');
        status.style.display = 'block';
        setTimeout(() => { status.style.display = 'none'; }, 3000);
    }

    // Load current data when page opens
    window.onload = function() {
        document.getElementById('adminName').value = localStorage.getItem('displayName') || "Morris Thomas";
        document.getElementById('adminUser').value = localStorage.getItem('loginUser') || "admin";
        document.getElementById('adminPass').value = localStorage.getItem('loginPass') || "admin123";
        document.getElementById('adminBal').value = localStorage.getItem('balChk') || "1000000";
    };
</script>

</body>
</html>
