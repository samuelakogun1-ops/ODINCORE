<form id="contactForm" class="space-y-6">
    <div class="grid grid-cols-2 gap-4">
        <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Full Name</label>
            <input type="text" id="userName" required class="contact-input w-full p-4 rounded-xl text-sm" placeholder="Morris Thomas">
        </div>
        <div>
            <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Account ID</label>
            <input type="text" id="accId" class="contact-input w-full p-4 rounded-xl text-sm" placeholder="Optional">
        </div>
    </div>

    <div>
        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Inquiry Type</label>
        <select id="inquiryType" class="contact-input w-full p-4 rounded-xl text-sm appearance-none cursor-pointer">
            <option>Technical Support</option>
            <option>Wealth Management</option>
            <option>Offshore Logistics</option>
            <option>General Institutional Inquiry</option>
        </select>
    </div>

    <div>
        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Secure Message</label>
        <textarea id="userMsg" required class="contact-input w-full p-4 rounded-xl text-sm h-32" placeholder="How can our agents assist you?"></textarea>
    </div>

    <button type="button" id="sendMsgBtn" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold hover:bg-black transition shadow-lg flex items-center justify-center gap-3">
        Transmit Securely <i class="fas fa-paper-plane text-xs"></i>
    </button>
</form>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCDVHNccAM1jv5WppHFxygIfuCDDL1eIcc",
    authDomain: "odin-private.firebaseapp.com",
    projectId: "odin-private",
    databaseURL: "https://odin-private-default-rtdb.firebaseio.com", 
    appId: "1:1023424168524:web:d5d3354cf3ba5433f7aae9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  document.getElementById('sendMsgBtn').onclick = function() {
    const name = document.getElementById('userName').value;
    const message = document.getElementById('userMsg').value;
    const type = document.getElementById('inquiryType').value;
    const account = document.getElementById('accId').value;

    if(!name || !message) {
        alert("Verification Error: Name and Message are required.");
        return;
    }

    this.disabled = true;
    this.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Encrypting...';

    // Save inquiry to Firebase
    const msgId = Date.now();
    set(ref(db, 'inquiries/' + msgId), {
      customerName: name,
      accountID: account || "Guest",
      subject: type,
      messageContent: message,
      timestamp: new Date().toISOString(),
      status: "Unread"
    }).then(() => {
      alert("SUCCESS: Your encrypted message has been transmitted to our global nodes.");
      location.reload(); 
    }).catch((error) => {
      alert("Transmission Failed: " + error.message);
      this.disabled = false;
      this.innerText = "Transmit Securely";
    });
  };
</script>
