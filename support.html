<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Support | Odin Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
        .input-field { 
            width: 100%; padding: 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0;
            background: #ffffff; transition: all 0.3s ease; font-size: 0.875rem;
        }
        .input-field:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div class="max-w-4xl w-full grid md:grid-cols-5 glass-card rounded-[2.5rem] shadow-2xl overflow-hidden">
        
        <div class="md:col-span-2 bg-slate-900 p-10 text-white flex flex-col justify-between">
            <div>
                <div class="flex items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center">
                        <i class="fas fa-shield-halved text-white"></i>
                    </div>
                    <span class="font-extrabold tracking-tighter uppercase">Odin <span class="text-blue-400">Private</span></span>
                </div>
                <h2 class="text-2xl font-bold mb-4">Secure Support Node</h2>
                <p class="text-slate-400 text-sm leading-relaxed mb-8">
                    Your inquiry will be routed through our encrypted global network for immediate executive review.
                </p>
                <div class="space-y-6">
                    <div class="flex items-center gap-4 text-sm">
                        <i class="fas fa-lock text-blue-400"></i> <span>AES-256 Bit Encryption</span>
                    </div>
                    <div class="flex items-center gap-4 text-sm">
                        <i class="fas fa-globe text-blue-400"></i> <span>24/7 Global Coverage</span>
                    </div>
                </div>
            </div>
            
            <div class="pt-10 border-t border-slate-800">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Protocol Status</p>
                <p class="text-xs text-emerald-400 mt-1 font-bold"><i class="fas fa-circle text-[8px] animate-pulse mr-2"></i> Online & Secured</p>
            </div>
        </div>

        <div class="md:col-span-3 p-10 bg-white">
            <form id="secureSupportForm" class="space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Full Name</label>
                        <input type="text" id="userName" required class="input-field" value="Morris Thomas">
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Account ID</label>
                        <input type="text" id="accId" class="input-field" placeholder="Optional">
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Inquiry Category</label>
                    <select id="inquiryType" class="input-field appearance-none cursor-pointer">
                        <option>Technical Support</option>
                        <option>Wealth Management</option>
                        <option>International Logistics</option>
                        <option>Security Verification</option>
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2 ml-1">Encrypted Message</label>
                    <textarea id="userMsg" required class="input-field h-32 resize-none" placeholder="Enter your request here..."></textarea>
                </div>

                <button type="button" id="sendMsgBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200 flex items-center justify-center gap-3">
                    Transmit Securely <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCDVHNccAM1jv5WppHFxygIfuCDDL1eIcc",
            authDomain: "odin-private.firebaseapp.com",
            projectId: "odin-private",
            databaseURL: "https://odin-private-default-rtdb.firebaseio.com", 
            appId: "1:1023424168524:web:d5d3354cf3ba5433f7aae9"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('sendMsgBtn').onclick = function() {
            const name = document.getElementById('userName').value;
            const message = document.getElementById('userMsg').value;
            const type = document.getElementById('inquiryType').value;
            
            if(!name || !message) {
                alert("PROTOCOL ERROR: Information required.");
                return;
            }

            this.disabled = true;
            this.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Encrypting...';

            const msgId = Date.now();
            set(ref(db, 'inquiries/' + msgId), {
                sender: name,
                category: type,
                content: message,
                timestamp: new Date().toLocaleString(),
                status: "Pending"
            }).then(() => {
                alert("TRANSMISSION SUCCESSFUL: Your message is secured.");
                location.reload();
            });
        };
    </script>
</body>
</html>
