<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Support | Odin Private</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); border: 1px solid #e2e8f0; backdrop-filter: blur(10px); }
        .input-field { width: 100%; padding: 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; background: #fff; transition: all 0.3s ease; font-size: 0.875rem; }
        .input-field:focus { border-color: #2563eb; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="flex min-h-screen items-center justify-center p-6">
    <div class="grid w-full max-w-4xl overflow-hidden rounded-[2.5rem] shadow-2xl glass-card md:grid-cols-5">
        <div class="flex flex-col justify-between bg-slate-900 p-10 text-white md:col-span-2">
            <div>
                <div class="mb-10 flex items-center gap-3">
                    <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-blue-600"><i class="fas fa-shield-halved text-white"></i></div>
                    <span class="text-lg font-extrabold uppercase tracking-tight">Odin <span class="text-blue-400">Private</span></span>
                </div>
                <h2 class="mb-4 text-2xl font-bold">Secure Support Node</h2>
                <p class="mb-8 text-sm leading-relaxed text-slate-400">Your inquiry is routed through a protected channel and reviewed by our specialist team.</p>
                <div class="space-y-6 text-sm">
                    <div class="flex items-center gap-4"><i class="fas fa-lock text-blue-400"></i><span>Encrypted communications</span></div>
                    <div class="flex items-center gap-4"><i class="fas fa-globe text-blue-400"></i><span>24/7 global coverage</span></div>
                </div>
            </div>
            <div class="border-t border-slate-800 pt-8">
                <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">Protocol status</p>
                <p class="mt-1 text-xs font-bold text-emerald-400"><i class="fas fa-circle mr-2 animate-pulse text-[8px]"></i> Online & secured</p>
            </div>
        </div>

        <div class="bg-white p-10 md:col-span-3">
            <form id="secureSupportForm" class="space-y-6">
                <div class="grid gap-4 sm:grid-cols-2">
                    <div>
                        <label class="mb-2 ml-1 block text-[10px] font-bold uppercase text-slate-400">Full Name</label>
                        <input type="text" id="userName" required class="input-field" value="Morris Thomas">
                    </div>
                    <div>
                        <label class="mb-2 ml-1 block text-[10px] font-bold uppercase text-slate-400">Account ID</label>
                        <input type="text" id="accId" class="input-field" placeholder="Optional">
                    </div>
                </div>

                <div>
                    <label class="mb-2 ml-1 block text-[10px] font-bold uppercase text-slate-400">Inquiry Category</label>
                    <select id="inquiryType" class="input-field cursor-pointer appearance-none">
                        <option>Technical Support</option>
                        <option>Wealth Management</option>
                        <option>International Logistics</option>
                        <option>Security Verification</option>
                    </select>
                </div>

                <div>
                    <label class="mb-2 ml-1 block text-[10px] font-bold uppercase text-slate-400">Encrypted Message</label>
                    <textarea id="userMsg" required class="input-field h-32 resize-none" placeholder="Enter your request here..."></textarea>
                </div>

                <button type="button" id="sendMsgBtn" class="flex w-full items-center justify-center gap-3 rounded-xl bg-blue-600 py-4 font-bold text-white shadow-lg shadow-blue-200 transition hover:bg-blue-700">
                    Transmit Securely <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        if (localStorage.getItem('odinAuth') !== 'true') {
            window.location.href = 'login.html';
        }

        document.getElementById('sendMsgBtn').addEventListener('click', function () {
            const name = document.getElementById('userName').value.trim();
            const message = document.getElementById('userMsg').value.trim();
            const type = document.getElementById('inquiryType').value;

            if (!name || !message) {
                alert('Please include your name and a message before sending.');
                return;
            }

            this.disabled = true;
            this.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Encrypting...';

            const inquiries = JSON.parse(localStorage.getItem('odinInquiries') || '[]');
            inquiries.unshift({
                sender: name,
                category: type,
                content: message,
                timestamp: new Date().toLocaleString(),
                status: 'Pending'
            });
            localStorage.setItem('odinInquiries', JSON.stringify(inquiries.slice(0, 8)));

            setTimeout(() => {
                alert('Transmission successful. Your message has been secured.');
                window.location.href = 'dashboard.html';
            }, 900);
        });
    </script>
</body>
</html>
