<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transglobal | User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { background: white; min-height: 100vh; padding: 20px; border-right: 1px solid #ddd; }
        .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .balance-box { background: linear-gradient(45deg, #1a237e, #283593); color: white; padding: 30px; border-radius: 15px; }
        .nav-link { color: #555; padding: 12px; border-radius: 8px; margin-bottom: 5px; display: block; text-decoration: none; }
        .nav-link:hover, .nav-link.active { background: #e8eaf6; color: #1a237e; font-weight: bold; }
        .profile-img { width: 100px; height: 100px; object-fit: cover; border: 3px solid #1a237e; border-radius: 50%; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 sidebar shadow-sm text-center">
            <h4 class="text-primary fw-bold mb-4">ODIN PRIVATE</h4>
            <img src="https://via.placeholder.com/100" id="user-photo" class="profile-img mb-3">
            <h5 class="fw-bold mb-0">Morris Thomas</h5>
            <p class="small text-muted mb-4">GOLD MEMBER</p>
            
            <nav class="text-start">
                <a href="index.html" class="nav-link active"><i class="fas fa-chart-line me-2"></i> Dashboard</a>
                <a href="transfer.html" class="nav-link"><i class="fas fa-globe me-2"></i> International Wire</a>
                <a href="#" class="nav-link"><i class="fas fa-credit-card me-2"></i> Card Services</a>
                <a href="#" class="nav-link text-danger mt-5"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
            </nav>
        </div>

        <div class="col-md-9 p-4">
            <div class="balance-box shadow mb-4">
                <small class="opacity-75">TOTAL PORTFOLIO VALUE</small>
                <h1 class="fw-bold" id="main-balance">$10,000,000.00</h1>
            </div>

            <div class="card card-custom p-4 mb-4">
                <h5 class="fw-bold mb-4">Recent Activity</h5>
                <div id="activity-log">
                    <div class="d-flex justify-content-between border-bottom py-3">
                        <div><strong>Account Opening Bonus</strong><br><small class="text-muted">May 01, 2026</small></div>
                        <div class="text-success fw-bold">+$10,000,000.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Load Balance and Photo
    window.onload = function() {
        const bal = localStorage.getItem('total_balance') || "10000000";
        document.getElementById('main-balance').innerText = "$" + parseFloat(bal).toLocaleString(undefined, {minimumFractionDigits: 2});
        
        const photo = localStorage.getItem('saved_photo');
        if(photo) document.getElementById('user-photo').src = photo;
        
        const history = JSON.parse(localStorage.getItem('trans_history')) || [];
        history.forEach(item => {
            const row = `<div class="d-flex justify-content-between border-bottom py-3">
                <div><strong>${item.note}</strong><br><small class="text-muted">${item.date}</small></div>
                <div class="text-danger fw-bold">-$${parseFloat(item.amt).toLocaleString()}</div>
            </div>`;
            document.getElementById('activity-log').insertAdjacentHTML('afterbegin', row);
        });
    };
</script>
</body>
</html>
