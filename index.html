<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transglobal | User Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    <style>
        body { background: #f4f7f6; font-family: sans-serif; }
        .card-custom { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .balance-card { background: #000; color: #fff; padding: 30px; position: relative; overflow: hidden; }
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 9999; text-align: center; padding-top: 20%; }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner-border text-primary mb-3"></div>
    <h4>Securing Connection...</h4>
    <p>Encrypting transaction data</p>
</div>

<div class="container mt-4">
    <div class="card card-custom balance-card mb-4">
        <small class="opacity-75">TOTAL PORTFOLIO VALUE</small>
        <h1 id="balance-display">$10,000,000.00</h1>
        <div class="mt-4">**** **** **** 0992</div>
        <div class="fw-bold">MORRIS THOMAS</div>
    </div>

    <div class="card card-custom p-4 mb-4">
        <h5 class="fw-bold"><i class="fas fa-globe me-2"></i>International Wire Transfer</h5>
        <hr>
        <div class="row g-3">
            <div class="col-md-6"><input type="text" id="ben-name" class="form-control" placeholder="Beneficiary Full Name"></div>
            <div class="col-md-6"><input type="text" id="ben-bank" class="form-control" placeholder="Bank Name"></div>
            <div class="col-md-6"><input type="number" id="ben-amount" class="form-control" placeholder="Amount (USD)"></div>
            <div class="col-md-6"><button class="btn btn-primary w-100 fw-bold" onclick="executeTransfer()">CONFIRM TRANSFER</button></div>
        </div>
    </div>

    <div class="card card-custom p-4">
        <h5 class="fw-bold">Recent Activity</h5>
        <div id="activity-list">
            <div class="d-flex justify-content-between border-bottom py-3">
                <div><strong>Offshore Salary Deposit</strong><br><small class="text-muted">April 27, 2026</small></div>
                <div class="text-success fw-bold">+$10,000,000.00</div>
            </div>
        </div>
    </div>
</div>

<div id="chat-container" style="position: fixed; bottom: 20px; right: 20px; width: 300px; z-index: 1000;">
    <div id="chat-box" class="card shadow-lg d-none">
        <div class="card-header bg-primary text-white">Support Chat</div>
        <div id="chat-msgs" class="card-body bg-light" style="height: 200px; overflow-y: auto; font-size: 0.9rem;"></div>
        <div class="card-footer p-1">
            <div class="input-group">
                <input type="text" id="chat-input" class="form-control border-0" placeholder="Type here...">
                <button class="btn btn-primary btn-sm" onclick="sendToAdmin()">Send</button>
            </div>
        </div>
    </div>
    <button class="btn btn-primary rounded-circle shadow p-3 float-end" onclick="document.getElementById('chat-box').classList.toggle('d-none')">
        <i class="fas fa-comments fa-lg"></i>
    </button>
</div>

<script>
    // Initialize Data
    let balance = localStorage.getItem('totalBalance') ? parseFloat(localStorage.getItem('totalBalance')) : 10000000;
    document.getElementById('balance-display').innerText = "$" + balance.toLocaleString(undefined, {minimumFractionDigits: 2});

    function executeTransfer() {
        const name = document.getElementById('ben-name').value;
        const amt = parseFloat(document.getElementById('ben-amount').value);
        
        if(!name || isNaN(amt)) return alert("Please fill in all details.");
        if(amt > balance) return alert("Insufficient balance.");

        // Show Loading Overlay
        document.getElementById('loading-overlay').style.display = 'block';

        setTimeout(() => {
            // Update Balance
            balance -= amt;
            localStorage.setItem('totalBalance', balance);
            document.getElementById('balance-display').innerText = "$" + balance.toLocaleString(undefined, {minimumFractionDigits: 2});

            // Add to History (Fixes NaN and Undefined)
            const newRow = `<div class="d-flex justify-content-between border-bottom py-3">
                <div><strong>Wire Transfer to ${name}</strong><br><small class="text-muted">Today</small></div>
                <div class="text-danger fw-bold">-$${amt.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
            </div>`;
            document.getElementById('activity-list').insertAdjacentHTML('afterbegin', newRow);

            // Reset UI
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('ben-name').value = '';
            document.getElementById('ben-amount').value = '';
            alert("Transfer Processed Successfully!");
        }, 3000);
    }

    function sendToAdmin() {
        const msg = document.getElementById('chat-input').value;
        if(!msg) return;
        document.getElementById('chat-msgs').innerHTML += `<div class="text-end mb-2"><span class="bg-primary text-white p-2 rounded d-inline-block">You: ${msg}</span></div>`;
        localStorage.setItem('customer_msg', msg); // Send to Admin page
        document.getElementById('chat-input').value = '';
    }
</script>
</body>
</html>
