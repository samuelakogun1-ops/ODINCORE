<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODIN PRIVATE | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #050a14; color: white; font-family: sans-serif; }
        .sidebar { background: #080e1b; min-height: 100vh; padding: 25px; border-right: 1px solid #1a2236; }
        .nav-link { color: #a0a8b1; padding: 12px; margin-bottom: 10px; border-radius: 8px; text-decoration: none; display: block; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: rgba(212, 175, 55, 0.1); color: #d4af37; border-left: 3px solid #d4af37; }
        .main-card { background: #0d1526; border: 1px solid #1c263d; border-radius: 15px; padding: 30px; }
        .balance { font-size: 2.5rem; color: #d4af37; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 sidebar text-center">
                <img id="user-pfp" src="https://via.placeholder.com/80" class="rounded-circle mb-3" style="border: 2px solid #d4af37; width: 80px; height: 80px; object-fit: cover;">
                <h6 class="fw-bold">Morris Thomas</h6>
                <hr class="border-secondary">
                <nav class="text-start mt-4">
                    <a href="index.html" class="nav-link active"><i class="fas fa-home me-2"></i> Dashboard</a>
                    <a href="transfer.html" class="nav-link"><i class="fas fa-university me-2"></i> Transfer</a>
                    <a href="card.html" class="nav-link"><i class="fas fa-credit-card me-2"></i> Card Settings</a>
                </nav>
            </div>
            <div class="col-md-9 p-5">
                <div class="main-card shadow-lg">
                    <small class="text-muted text-uppercase fw-bold">Current Balance</small>
                    <div class="balance mt-2">$10,000,000.00</div>
                    <div class="mt-4 small text-muted">Account: **** **** 0992</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        const photo = localStorage.getItem('saved_photo');
        if(photo) document.getElementById('user-pfp').src = photo;
    </script>
</body>
</html>
