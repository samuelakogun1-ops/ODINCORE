<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ODIN PRIVATE | Elite Banking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #0a0e1a; }
        body { background: var(--dark); color: white; font-family: 'Inter', sans-serif; }
        .sidebar { background: #0d1117; min-height: 100vh; border-right: 1px solid #30363d; padding: 25px; }
        .nav-link { color: #8b949e; padding: 12px; border-radius: 8px; margin-bottom: 10px; display: block; text-decoration: none; }
        .nav-link:hover, .active-link { background: #21262d; color: var(--gold) !important; border-left: 3px solid var(--gold); }
        .premium-card { background: #161b22; border: 1px solid #30363d; border-radius: 20px; padding: 30px; }
        .profile-img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-3 col-lg-2 sidebar">
            <div class="text-center mb-4">
                <img id="user-photo" src="https://via.placeholder.com/100" class="profile-img">
                <h6 class="mt-2 fw-bold">Morris Thomas</h6>
                <small class="text-success"><i class="fas fa-circle small"></i> Online</small>
            </div>
            <nav>
                <a href="index.html" class="nav-link active-link"><i class="fas fa-th-large me-2"></i> Dashboard</a>
                <a href="transfer.html" class="nav-link"><i class="fas fa-exchange-alt me-2"></i> Wire Transfer</a>
                <a href="card.html" class="nav-link"><i class="fas fa-credit-card me-2"></i> Card Services</a>
                <a href="admin.html" class="nav-link"><i class="fas fa-user-shield me-2"></i> Settings</a>
            </nav>
        </div>
        <div class="col-md-9 col-lg-10 p-5">
            <div class="premium-card shadow-lg">
                <small class="text-muted fw-bold">TOTAL ASSETS</small>
                <h1 class="display-4 fw-bold text-gold" style="color: #d4af37;">$10,000,000.00</h1>
                <hr class="border-secondary">
                <p class="mb-0 small text-muted">Account Number: **** **** 0992</p>
            </div>
        </div>
    </div>
</div>
<script>
    // Loads the photo you upload on the Admin page
    const savedPhoto = localStorage.getItem('saved_photo');
    if(savedPhoto) document.getElementById('user-photo').src = savedPhoto;
</script>
</body>
</html>
